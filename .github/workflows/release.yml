name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog from git log
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          echo "## 📦 Changes since ${PREV_TAG:-initial commit}" > /tmp/changelog.md
          echo "" >> /tmp/changelog.md

          git log $RANGE --pretty=format:"- %s (%h)" \
            --no-merges >> /tmp/changelog.md

          echo "" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "---" >> /tmp/changelog.md
          echo "**Full diff**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.tag.outputs.version }}" >> /tmp/changelog.md

          cat /tmp/changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: ${{ steps.tag.outputs.version }}
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
