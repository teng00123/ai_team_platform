<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Team — 3D Command Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c1220;color:#e2e8f8;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;height:100vh}
#c{position:fixed;inset:0;width:100%;height:100%}

/* 顶栏 */
.topbar{position:fixed;top:0;left:0;right:0;z-index:20;padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(12,18,32,.95) 60%,transparent);
  backdrop-filter:blur(8px)}
.tb-title{font-size:1rem;font-weight:700;letter-spacing:.06em;
  background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tb-sub{font-size:.68rem;color:#4a6080;margin-top:1px}
.tb-btns{display:flex;gap:8px}
.tb-btn{padding:7px 16px;border-radius:10px;font-size:.78rem;font-weight:600;
  cursor:pointer;font-family:inherit;transition:.2s;border:none}
.tb-back{background:rgba(255,255,255,.06);color:#94a3b8}
.tb-back:hover{background:rgba(255,255,255,.1)}
.tb-cmd{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}
.tb-cmd:hover{opacity:.85}

/* 工作流底栏 */
.wf-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:14px 20px 18px;
  background:linear-gradient(0deg,rgba(12,18,32,.98) 70%,transparent)}
.wf-wrap{max-width:780px;margin:0 auto;background:rgba(15,22,40,.9);
  border:1px solid rgba(96,165,250,.2);border-radius:16px;padding:14px 20px;
  backdrop-filter:blur(16px)}
.wf-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.wf-label{font-size:.65rem;color:#4a6080;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.wf-taskname{font-size:.8rem;color:#93c5fd;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wf-steps{display:flex;align-items:center}
.wf-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.wfd{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:.88rem;
  background:rgba(15,22,40,.8);transition:.4s;z-index:1}
.wfd.active{border-color:#60a5fa;background:rgba(96,165,250,.15);box-shadow:0 0 16px rgba(96,165,250,.35)}
.wfd.done{border-color:#34d399;background:rgba(52,211,153,.12)}
.wfl{font-size:.62rem;color:#4a6080;margin-top:5px;text-align:center;transition:.3s;line-height:1.3}
.wf-step.active .wfl{color:#60a5fa}
.wf-step.done .wfl{color:#34d399}
.wf-line{flex:1;height:2px;background:rgba(255,255,255,.08);margin-top:-17px;transition:.5s}
.wf-line.done{background:linear-gradient(90deg,#34d399,#60a5fa)}

/* 子任务侧边 */
.side{position:fixed;right:20px;top:50%;transform:translateY(-50%);
  z-index:20;display:flex;flex-direction:column;gap:8px;pointer-events:none;min-width:170px}
.sc{background:rgba(15,22,40,.88);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:10px 13px;backdrop-filter:blur(8px);transition:.3s}
.sc.running{border-color:#60a5fa;box-shadow:0 0 12px rgba(96,165,250,.2)}
.sc.done{border-color:#34d399;box-shadow:0 0 10px rgba(52,211,153,.15)}
.sc.failed{border-color:#f87171}
.sn{font-size:.78rem;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.ss{font-size:.63rem;color:#4a6080}
.sb{height:3px;border-radius:999px;background:rgba(255,255,255,.06);margin-top:7px;overflow:hidden}
.sf{height:100%;border-radius:999px;width:0%;transition:width .6s}
.sc.running .sf{background:linear-gradient(90deg,#60a5fa,#a78bfa);animation:pulse-bar 1.8s ease-in-out infinite}
.sc.done .sf{width:100%!important;background:linear-gradient(90deg,#34d399,#60a5fa)}
@keyframes pulse-bar{0%{width:15%}50%{width:85%}100%{width:15%}}

/* 角色名牌（右下角浮窗） */
.role-hud{position:fixed;left:20px;top:50%;transform:translateY(-50%);
  z-index:20;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.rhc{background:rgba(15,22,40,.88);border:1px solid rgba(255,255,255,.08);
  border-radius:11px;padding:9px 13px;backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:9px;transition:.3s;min-width:150px}
.rhc.active{border-color:#60a5fa;box-shadow:0 0 10px rgba(96,165,250,.2)}
.rhc.working{border-color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,.2)}
.rhdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);flex-shrink:0}
.rhc.active .rhdot{background:#60a5fa;animation:bd 1s infinite}
.rhc.working .rhdot{background:#fbbf24;animation:bd .5s infinite}
@keyframes bd{0%,100%{opacity:1}50%{opacity:.2}}
.rhname{font-size:.78rem;font-weight:700}
.rhstat{font-size:.62rem;color:#4a6080}

/* 浮动提示 */
.floater{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-6px);
  background:rgba(15,22,40,.95);border:1px solid rgba(96,165,250,.4);border-radius:12px;
  padding:9px 18px;font-size:.82rem;color:#93c5fd;z-index:50;
  opacity:0;transition:.35s;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 20px rgba(96,165,250,.2)}
.floater.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 弹窗 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:60;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal-box{background:#0f1628;border:1px solid rgba(96,165,250,.25);border-radius:22px;
  padding:30px;width:460px;max-width:92vw;transform:scale(.94);transition:.3s;
  box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-bg.show .modal-box{transform:scale(1)}
.modal-box.gold-border{border-color:rgba(251,191,36,.35)}
.mt{font-size:1rem;font-weight:700;margin-bottom:4px}
.mt.blue{background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mt.gold{background:linear-gradient(90deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mhint{font-size:.72rem;color:#4a6080;margin-bottom:20px}
.mlabel{font-size:.7rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block}
.minput{width:100%;background:#080e1c;border:1.5px solid rgba(255,255,255,.08);
  color:#e2e8f8;border-radius:10px;padding:10px 14px;font-size:.875rem;
  outline:none;font-family:inherit;margin-bottom:12px;transition:.2s}
.minput:focus{border-color:#60a5fa}
select.minput option{background:#0f1628}
textarea.minput{resize:vertical;min-height:80px}
.mbtns{display:flex;gap:10px;margin-top:4px}
.mcancel{flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,.05);
  color:#94a3b8;border:none;cursor:pointer;font-family:inherit;font-size:.85rem}
.msend{flex:2;padding:10px;border-radius:10px;border:none;font-weight:700;
  cursor:pointer;font-family:inherit;font-size:.9rem}
.msend.blue{background:linear-gradient(135deg,#4f6ef7,#7c3aed);color:#fff;
  box-shadow:0 4px 14px rgba(79,110,247,.35)}
.msend.gold{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;
  box-shadow:0 4px 14px rgba(245,158,11,.35)}
.msend:hover{opacity:.85}
.msend:disabled{opacity:.4;cursor:not-allowed}

/* 角色选择复选框 */
.role-checks{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.rcheck{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:5px 10px;
  cursor:pointer;font-size:.75rem;transition:.15s}
.rcheck:hover{border-color:#60a5fa;background:rgba(96,165,250,.08)}
.rcheck input{accent-color:#60a5fa}

/* 汇总弹窗 */
.sum-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:70;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:.3s}
.sum-modal.show{opacity:1;pointer-events:all}
.sum-box{background:#0f1628;border:1px solid rgba(52,211,153,.3);border-radius:22px;
  padding:28px;width:640px;max-width:93vw;max-height:80vh;
  overflow-y:auto;transform:scale(.94);transition:.3s;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.sum-modal.show .sum-box{transform:scale(1)}
.sum-box::-webkit-scrollbar{width:4px}
.sum-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.sum-title{font-size:1rem;font-weight:700;color:#34d399;display:flex;justify-content:space-between;margin-bottom:16px}
.sum-close{background:none;border:none;color:#4a6080;font-size:1.1rem;cursor:pointer}
.sum-body{font-size:.82rem;line-height:1.85;color:#c8d8f0;white-space:pre-wrap}

/* loading */
#loading{position:fixed;inset:0;background:#0c1220;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
.spin{width:50px;height:50px;border:3px solid rgba(96,165,250,.2);border-top-color:#60a5fa;
  border-radius:50%;animation:spin .75s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><div style="color:#4a6080;font-size:.82rem">初始化场景…</div></div>
<canvas id="c"></canvas>

<div class="topbar">
  <div>
    <div class="tb-title">🤖 AI Team · Command Center</div>
    <div class="tb-sub">主控编排 · 多 Agent 协作 · 实时可视化</div>
  </div>
  <div class="tb-btns">
    <button class="tb-btn tb-back" onclick="location.href='/'">← 管理台</button>
    <button class="tb-btn tb-cmd" onclick="openCmd()">👑 下达指令</button>
  </div>
</div>

<div class="role-hud" id="rhud"></div>
<div class="side" id="side"></div>

<div class="wf-bar">
  <div class="wf-wrap">
    <div class="wf-top">
      <span class="wf-label">工作流进度</span>
      <span class="wf-taskname" id="wf-task">等待指令…</span>
    </div>
    <div class="wf-steps" id="wf-steps"></div>
  </div>
</div>

<div class="floater" id="floater"></div>

<!-- 指令弹窗 -->
<div class="modal-bg" id="cmd-modal">
  <div class="modal-box gold-border">
    <div class="mt gold">👑 下达指令</div>
    <div class="mhint">主控将自动分析并拆解任务，指挥各角色并发执行</div>
    <label class="mlabel">主控角色</label>
    <select class="minput" id="m-ctrl"></select>
    <label class="mlabel">任务内容</label>
    <textarea class="minput" id="m-msg" rows="3" placeholder="例：设计一款 AI 团队协作产品…"></textarea>
    <label class="mlabel">指定执行角色（默认全部）</label>
    <div class="role-checks" id="m-checks"></div>
    <div class="mbtns">
      <button class="mcancel" onclick="closeCmd()">取消</button>
      <button class="msend gold" id="m-send" onclick="submitCmd()">🚀 下达</button>
    </div>
  </div>
</div>

<!-- 汇总弹窗 -->
<div class="sum-modal" id="sum-modal">
  <div class="sum-box">
    <div class="sum-title">
      📋 任务汇总报告
      <button class="sum-close" onclick="document.getElementById('sum-modal').classList.remove('show')">✕</button>
    </div>
    <div class="sum-body" id="sum-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ═════════════════════════════════════════════
// 状态
// ═════════════════════════════════════════════
let roles=[], scene, camera, renderer, clock;
let agentMap={};  // id → agent obj
let beams=[];
const COLORS=[0x4f6ef7,0x7c3aed,0x10b981,0xf59e0b,0xef4444,0x06b6d4,0x8b5cf6,0xec4899];
const CHEX=['#4f6ef7','#7c3aed','#10b981','#f59e0b','#ef4444','#06b6d4','#8b5cf6','#ec4899'];
const ICONS=['💼','💻','🎨','📊','🔬','📱','🛡️','🚀','💡','🎯','📝','🔧'];

const WF=[{e:'📋',l:'接收指令'},{e:'🧠',l:'任务分析'},{e:'⚡',l:'拆解下发'},{e:'⚙️',l:'并发执行'},{e:'📊',l:'汇总交付'}];

// ═════════════════════════════════════════════
// Three.js 初始化
// ═════════════════════════════════════════════
function initThree(){
  const cvs=document.getElementById('c');
  renderer=new THREE.WebGLRenderer({canvas:cvs,antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.3;
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0c1220);
  scene.fog=new THREE.FogExp2(0x0c1220,.045);
  camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,.1,80);
  camera.position.set(0,4.5,11);
  camera.lookAt(0,2,0);
  clock=new THREE.Clock();

  // 灯光
  scene.add(new THREE.AmbientLight(0xc8d8ff,1.6));
  const sun=new THREE.DirectionalLight(0xfff0e0,1.8);
  sun.position.set(5,10,6); sun.castShadow=true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.near=.1; sun.shadow.camera.far=30;
  sun.shadow.camera.left=-8; sun.shadow.camera.right=8;
  sun.shadow.camera.top=8; sun.shadow.camera.bottom=-8;
  scene.add(sun);
  [[−4,3,3,0x8ab4f8],[4,3,3,0xc4a0ff],[0,5,−2,0xffe8a0]].forEach(([x,y,z,c])=>{
    const pl=new THREE.PointLight(c,1.2,14); pl.position.set(x,y,z); scene.add(pl);
  });

  buildStage();
  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
}

function buildStage(){
  // 地板
  const floor=new THREE.Mesh(new THREE.CircleGeometry(14,72),
    new THREE.MeshStandardMaterial({color:0x111828,roughness:.8,metalness:.05}));
  floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);

  // 同心发光圈
  [[2,.3],[4,.2],[6,.15],[9,.08]].forEach(([r,o])=>{
    const ring=new THREE.Mesh(new THREE.TorusGeometry(r,.018,4,80),
      new THREE.MeshBasicMaterial({color:0x1e3a6e,transparent:true,opacity:o}));
    ring.rotation.x=-Math.PI/2; scene.add(ring);
  });

  // 中心主控台（六边形）
  const hexGeo=new THREE.CylinderGeometry(.85,.85,.06,6);
  const hexMat=new THREE.MeshStandardMaterial({color:0x1a1200,roughness:.3,metalness:.7,
    emissive:0xffa500,emissiveIntensity:.18});
  scene.add(Object.assign(new THREE.Mesh(hexGeo,hexMat),{position:new THREE.Vector3(0,.03,0)}));

  // 六边形发光环
  const hr=new THREE.Mesh(new THREE.TorusGeometry(.87,.025,6,6),
    new THREE.MeshStandardMaterial({color:0xffd700,emissive:0xffd700,emissiveIntensity:1.2,
      transparent:true,opacity:.9}));
  hr.rotation.x=-Math.PI/2; hr.position.y=.06; scene.add(hr);

  // 地面粒子
  const pg=new THREE.BufferGeometry(), n=600, pp=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, r=Math.random()*13;
    pp[i*3]=Math.cos(a)*r; pp[i*3+1]=.02; pp[i*3+2]=Math.sin(a)*r;
  }
  pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
  scene.add(new THREE.Points(pg,new THREE.PointsMaterial({color:0x1a3060,size:.035})));

  // 天空粒子
  const sg=new THREE.BufferGeometry(), sp=new Float32Array(500*3);
  for(let i=0;i<500;i++){sp[i*3]=(Math.random()-.5)*30;sp[i*3+1]=Math.random()*18+1;sp[i*3+2]=(Math.random()-.5)*30-2;}
  sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x0d2050,size:.04})));
}

// ═════════════════════════════════════════════
// 卡通角色构建（更明亮圆润）
// ═════════════════════════════════════════════
function buildAgent(role,pos,color,isCtrl){
  const g=new THREE.Group(); g.position.copy(pos);
  const M=c=>new THREE.MeshStandardMaterial({color:c,roughness:.35,metalness:.15});
  const Mg=c=>new THREE.MeshStandardMaterial({color:c,roughness:.35,metalness:.15,emissive:c,emissiveIntensity:.12});

  // 光台
  const plat=new THREE.Mesh(new THREE.CylinderGeometry(isCtrl?.72:.5,.5,.05,isCtrl?6:32),
    new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:isCtrl?.5:.25,
      transparent:true,opacity:.3,roughness:.6,metalness:.4}));
  plat.position.y=.025; g.add(plat);

  // 光柱
  const beam=new THREE.Mesh(new THREE.CylinderGeometry(.01,.35,5,12,1,true),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:.03,side:THREE.DoubleSide}));
  beam.position.y=2.5; g.add(beam);

  // 鞋
  [-1,1].forEach(s=>{
    const sh=new THREE.Mesh(new THREE.BoxGeometry(.14,.09,.22),M(0x1a1f3a));
    sh.position.set(s*.1,.1,.04); sh.castShadow=true; g.add(sh);
  });
  // 腿（更圆）
  [-1,1].forEach(s=>{
    const l=new THREE.Mesh(new THREE.CapsuleGeometry(.09,.38,4,8),M(isCtrl?0x2a1500:0x1e2a4a));
    l.position.set(s*.1,.38,0); l.castShadow=true; g.add(l);
  });
  // 腰
  const waist=new THREE.Mesh(new THREE.SphereGeometry(.22,.16,.1,12),Mg(color));
  waist.position.y=.66; g.add(waist);
  // 身体（圆桶）
  const torso=new THREE.Mesh(new THREE.CapsuleGeometry(.21,.36,6,12),Mg(color));
  torso.position.y=.98; torso.castShadow=true; g.add(torso);

  if(isCtrl){
    // 披肩
    const capeGeo=new THREE.ConeGeometry(.3,.45,8,1,true);
    const cape=new THREE.Mesh(capeGeo,new THREE.MeshStandardMaterial({color,transparent:true,
      opacity:.45,side:THREE.DoubleSide,emissive:color,emissiveIntensity:.1}));
    cape.position.set(0,.72,-.12); cape.rotation.x=-.15; g.add(cape);
  }

  // 领口
  const col=new THREE.Mesh(new THREE.TorusGeometry(.13,.04,8,16),M(0xffffff));
  col.position.y=1.2; g.add(col);

  // 手臂（圆润）
  const arms=[];
  [-1,1].forEach(s=>{
    const ag=new THREE.Group(); ag.position.set(s*.32,1.12,0);
    const up=new THREE.Mesh(new THREE.CapsuleGeometry(.085,.22,4,8),Mg(color));
    up.position.y=-.14; ag.add(up);
    const elb=new THREE.Mesh(new THREE.SphereGeometry(.09,8,8),Mg(color));
    elb.position.y=-.3; ag.add(elb);
    const lo=new THREE.Mesh(new THREE.CapsuleGeometry(.075,.2,4,8),M(0xffd4b0));
    lo.position.y=-.47; ag.add(lo);
    const hand=new THREE.Mesh(new THREE.SphereGeometry(.1,10,10),M(0xffd4b0));
    hand.position.y=-.62; ag.add(hand);
    g.add(ag); arms.push(ag);
  });

  // 颈
  g.add(Object.assign(new THREE.Mesh(new THREE.CapsuleGeometry(.08,.1,4,8),M(0xffd4b0)),
    {position:new THREE.Vector3(0,1.24,0)}));

  // 头（大圆头！）
  const head=new THREE.Mesh(new THREE.SphereGeometry(.3,20,16),M(0xffd4b0));
  head.scale.set(1,1.08,1); head.position.y=1.6; head.castShadow=true; g.add(head);

  // 腮红
  [-1,1].forEach(s=>{
    const ch=new THREE.Mesh(new THREE.SphereGeometry(.1,8,8),
      new THREE.MeshStandardMaterial({color:0xffaaaa,transparent:true,opacity:.45}));
    ch.position.set(s*.22,1.59,.26); ch.scale.z=.25; g.add(ch);
  });

  // 眼睛（大！）
  [-1,1].forEach(s=>{
    const ew=new THREE.Mesh(new THREE.SphereGeometry(.1,12,12),M(0xffffff));
    ew.position.set(s*.12,1.62,.27); ew.scale.z=.45; g.add(ew);
    const ep=new THREE.Mesh(new THREE.SphereGeometry(.07,10,10),M(0x1a1f3a));
    ep.position.set(s*.12,1.62,.3); ep.scale.z=.4; g.add(ep);
    const sh2=new THREE.Mesh(new THREE.SphereGeometry(.025,6,6),M(0xffffff));
    sh2.position.set(s*.12+.04,1.65,.35); g.add(sh2);
  });
  // 嘴
  const mg=new THREE.TorusGeometry(.07,.012,6,14,Math.PI);
  const mouth=new THREE.Mesh(mg,M(0xcc5566));
  mouth.position.set(0,1.5,.28); mouth.rotation.z=Math.PI; g.add(mouth);

  // 头发（卡通刘海）
  const hcol=isCtrl?0xb8710a:0x1e2a5a;
  const hair=new THREE.Mesh(new THREE.SphereGeometry(.315,16,8,0,Math.PI*2,0,Math.PI*.52),M(hcol));
  hair.position.y=1.68; g.add(hair);
  const bang=new THREE.Mesh(new THREE.SphereGeometry(.16,.12,.11,8),M(hcol));
  bang.position.set(0,1.78,.25); g.add(bang);

  // 耳朵
  [-1,1].forEach(s=>{
    const ear=new THREE.Mesh(new THREE.SphereGeometry(.1,8,8),M(0xffd4b0));
    ear.position.set(s*.28,1.6,0); ear.scale.z=.45; g.add(ear);
  });

  if(isCtrl){
    // 皇冠（精致版）
    const cm=new THREE.MeshStandardMaterial({color:0xffd700,emissive:0xffa500,
      emissiveIntensity:.5,metalness:.8,roughness:.15});
    const cr=new THREE.Mesh(new THREE.CylinderGeometry(.26,.2,.1,6),cm);
    cr.position.y=1.98; g.add(cr);
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2;
      const sp=new THREE.Mesh(new THREE.ConeGeometry(.055,.18,6),cm);
      sp.position.set(Math.cos(a)*.19,2.14,Math.sin(a)*.19); g.add(sp);
    }
    // 皇冠宝石
    [-1,1].forEach((s,i)=>{
      const gems=new THREE.Mesh(new THREE.OctahedronGeometry(.04),
        new THREE.MeshStandardMaterial({color:[0xff4466,0x44aaff][i],emissive:[0xff2244,0x2288ff][i],emissiveIntensity:.6}));
      gems.position.set(s*.14,2.04,0); g.add(gems);
    });
  }

  // 头顶光圈
  const halo=new THREE.Mesh(new THREE.TorusGeometry(isCtrl?.32:.24,.016,8,32),
    new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:1,transparent:true,opacity:.75}));
  halo.position.y=isCtrl?2.06:1.92; g.add(halo);

  // 名牌
  const nameTag=makeTag(role.name,isCtrl?'#fbbf24':CHEX[0],isCtrl);
  nameTag.position.y=isCtrl?2.5:2.25; g.add(nameTag);

  scene.add(g);
  g.userData.roleId=role.id;
  return {g,head,torso,arms,halo,beam,plat,nameTag,role,color,isCtrl,phase:Math.random()*Math.PI*2,working:false};
}

function makeTag(name,color,isCtrl){
  const cvs=document.createElement('canvas'); cvs.width=260; cvs.height=isCtrl?72:58;
  const ctx=cvs.getContext('2d');
  // 背景
  ctx.fillStyle=isCtrl?'rgba(20,12,0,.92)':'rgba(12,18,32,.9)';
  ctx.roundRect(3,4,254,isCtrl?63:49,12); ctx.fill();
  // 描边
  ctx.strokeStyle=color; ctx.lineWidth=isCtrl?2:1.5;
  ctx.roundRect(3,4,254,isCtrl?63:49,12); ctx.stroke();
  // 文字
  ctx.fillStyle=color;
  ctx.font=`${isCtrl?'bold 22':'bold 20'}px -apple-system,sans-serif`;
  ctx.textAlign='center';
  ctx.fillText((isCtrl?'👑 ':'')+name.slice(0,9),130,isCtrl?34:30);
  if(isCtrl){ctx.font='11px sans-serif';ctx.fillStyle='rgba(251,191,36,.6)';ctx.fillText('C O M M A N D E R',130,52);}
  return new THREE.Mesh(new THREE.PlaneGeometry(1.1,isCtrl?.32:.26),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cvs),transparent:true,depthWrite:false}));
}

// ═════════════════════════════════════════════
// 指挥光束粒子
// ═════════════════════════════════════════════
function spawnBeam(from,to,color){
  const mat=new THREE.MeshBasicMaterial({color,transparent:true});
  for(let i=0;i<10;i++){
    const p=new THREE.Mesh(new THREE.SphereGeometry(.05,6,6),mat.clone());
    const offset=i/10;
    p.position.lerpVectors(from,to,offset);
    scene.add(p);
    beams.push({mesh:p,from:from.clone(),to:to.clone(),progress:offset,speed:.007+Math.random()*.005,life:1});
  }
}

function updateBeams(){
  beams=beams.filter(b=>{
    b.progress+=b.speed;
    b.life=Math.max(0,1-Math.max(0,b.progress-.75)/.25);
    if(b.progress>1.1){scene.remove(b.mesh);b.mesh.geometry.dispose();return false;}
    b.mesh.position.lerpVectors(b.from,b.to,Math.min(b.progress,1));
    b.mesh.material.opacity=b.life*.95;
    const s=.5+b.life*.5; b.mesh.scale.set(s,s,s);
    return true;
  });
}

// ═════════════════════════════════════════════
// 工作流 UI
// ═════════════════════════════════════════════
function renderWF(step){
  const el=document.getElementById('wf-steps');
  el.innerHTML=WF.map((s,i)=>{
    const done=i<step,cur=i===step;
    return `${i>0?`<div class="wf-line ${done?'done':cur?'active':''}"></div>`:''}<div class="wf-step ${done?'done':''} ${cur?'active':''}"><div class="wfd ${done?'done':''} ${cur?'active':''}">${done?'✓':s.e}</div><div class="wfl">${s.l}</div></div>`;
  }).join('');
}

function setTask(t){document.getElementById('wf-task').textContent=t||'等待指令…'}

// ═════════════════════════════════════════════
// 子任务侧边 & 角色 HUD
// ═════════════════════════════════════════════
let subStates={};

function initSide(rNames){
  subStates={};
  rNames.forEach(n=>{subStates[n]={status:'pending'};});
  renderSide();
}

function setSub(name,status){
  if(subStates[name]) subStates[name].status=status;
  renderSide();
}

function renderSide(){
  const el=document.getElementById('side');
  const keys=Object.keys(subStates);
  if(!keys.length){el.innerHTML='';return;}
  el.innerHTML=keys.map(n=>{
    const s=subStates[n];
    const ico={pending:'⏳',running:'⚙️',done:'✅',failed:'❌'}[s.status]||'⏳';
    const label={pending:'等待',running:'执行中',done:'完成',failed:'失败'}[s.status];
    return `<div class="sc ${s.status}"><div class="sn">${ico} ${n}</div><div class="ss">${label}</div><div class="sb"><div class="sf"></div></div></div>`;
  }).join('');
}

function renderHud(){
  const el=document.getElementById('rhud');
  const objs=Object.values(agentMap);
  if(!objs.length){el.innerHTML='';return;}
  el.innerHTML=objs.map((a,i)=>{
    const cls=a.working?'working':(a===selectedAgent?'active':'');
    const stat=a.working?'⚙️ 执行中':(a===selectedAgent?'● 已选中':'○ 待命');
    const icon=a.isCtrl?'👑':ICONS[i%ICONS.length];
    return `<div class="rhc ${cls}"><div class="rhdot"></div><div><div class="rhname">${icon} ${a.role.name}</div><div class="rhstat">${stat}</div></div></div>`;
  }).join('');
}

// ═════════════════════════════════════════════
// 浮动提示
// ═════════════════════════════════════════════
function showFloat(msg,dur=2800){
  const el=document.getElementById('floater');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

// ═════════════════════════════════════════════
// SSE
// ═════════════════════════════════════════════
function connectSSE(){
  const es=new EventSource('/events');
  es.onmessage=e=>{try{handle(JSON.parse(e.data));}catch(_){}};
  es.onerror=()=>setTimeout(connectSSE,3000);
}

function handle({event,data}){
  if(!event||event==='connected') return;

  if(event==='orchestration_start'){
    setTask(data.message); renderWF(0);
    showFloat(`👑 ${data.controller} 开始分析…`);
    const ctrl=Object.values(agentMap).find(a=>a.isCtrl);
    if(ctrl){ctrl.halo.material.emissiveIntensity=3;ctrl.working=true;}
    initSide(data.target_roles);
    renderHud(); return;
  }
  if(event==='orchestration_step'){
    const m={analyzing:1,planned:2,dispatching:2};
    renderWF(m[data.step]??2);
    if(data.step==='dispatching'){
      showFloat('⚡ 拆解完成，下发任务中…');
      const ctrl=Object.values(agentMap).find(a=>a.isCtrl);
      if(ctrl){
        Object.values(agentMap).filter(a=>!a.isCtrl).forEach((a,i)=>{
          const fp=new THREE.Vector3(); ctrl.g.getWorldPosition(fp); fp.y+=1.5;
          const tp=new THREE.Vector3(); a.g.getWorldPosition(tp); tp.y+=1.3;
          setTimeout(()=>spawnBeam(fp,tp,0x60a5fa),i*200);
        });
      }
    }
    return;
  }
  if(event==='sub_task_update'){
    const a=agentMap[data.role_id]||Object.values(agentMap).find(x=>x.role.name===data.role_name);
    if(a){
      a.working=data.status==='running';
      a.halo.material.emissiveIntensity=data.status==='running'?2.5:data.status==='done'?1.2:.7;
    }
    setSub(data.role_name,data.status);
    if(data.status==='running') showFloat(`⚙️ ${data.role_name} 执行中…`);
    if(data.status==='done') showFloat(`✅ ${data.role_name} 完成！`);
    renderHud(); return;
  }
  if(event==='orchestration_done'){
    renderWF(5); showFloat('🎉 全部完成！报告已生成',4000);
    Object.values(agentMap).forEach(a=>{a.working=false;a.halo.material.emissiveIntensity=.8;});
    setTimeout(()=>{
      document.getElementById('sum-body').textContent=data.summary||'（无内容）';
      document.getElementById('sum-modal').classList.add('show');
    },1500);
    renderHud(); return;
  }
  if(event==='role_added'||event==='role_deleted') loadAndBuild();
}

// ═════════════════════════════════════════════
// 点击选中
// ═════════════════════════════════════════════
let selectedAgent=null;
const ray=new THREE.Raycaster(), mouse2=new THREE.Vector2();
window.addEventListener('click',e=>{
  mouse2.x=(e.clientX/innerWidth)*2-1;
  mouse2.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse2,camera);
  const meshes=[];
  Object.values(agentMap).forEach(a=>a.g.traverse(m=>{if(m.isMesh)meshes.push(m);}));
  const hits=ray.intersectObjects(meshes);
  if(!hits.length){selectedAgent=null;renderHud();return;}
  let obj=hits[0].object;
  while(obj.parent&&!obj.userData.roleId) obj=obj.parent;
  const found=Object.values(agentMap).find(a=>a.g===obj||a.g.userData.roleId===obj.userData.roleId);
  if(found){selectedAgent=found;showFloat(`🎯 ${found.role.name}`);renderHud();}
});

// ═════════════════════════════════════════════
// 弹窗
// ═════════════════════════════════════════════
function openCmd(){
  const sel=document.getElementById('m-ctrl');
  sel.innerHTML='<option value="">选择主控角色…</option>';
  roles.forEach(r=>{
    const o=document.createElement('option'); o.value=r.id;
    o.textContent=(r.is_controller?'👑 ':'')+r.name;
    if(r.is_controller) o.selected=true;
    sel.appendChild(o);
  });
  const chk=document.getElementById('m-checks');
  chk.innerHTML=roles.filter(r=>!r.is_controller).map(r=>`
    <label class="rcheck"><input type="checkbox" value="${r.id}"> ${r.name}</label>`).join('');
  document.getElementById('cmd-modal').classList.add('show');
}
function closeCmd(){document.getElementById('cmd-modal').classList.remove('show');}

async function submitCmd(){
  const cid=document.getElementById('m-ctrl').value;
  const msg=document.getElementById('m-msg').value.trim();
  if(!cid){showFloat('⚠️ 请选择主控');return;}
  if(!msg){showFloat('⚠️ 请输入任务');return;}
  const targets=[...document.querySelectorAll('#m-checks input:checked')].map(i=>i.value);
  const btn=document.getElementById('m-send');
  btn.disabled=true; btn.textContent='⏳ 执行中…';
  closeCmd();
  try{
    await fetch('/orchestrate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({controller_id:cid,message:msg,target_role_ids:targets.length?targets:null})});
  }catch(e){showFloat(`❌ ${e.message}`);}
  btn.disabled=false; btn.textContent='🚀 下达';
  document.getElementById('m-msg').value='';
}

// ═════════════════════════════════════════════
// 主动画
// ═════════════════════════════════════════════
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  Object.values(agentMap).forEach(a=>{
    const p=a.phase;
    // 呼吸
    a.torso.scale.y=1+Math.sin(t*1.1+p)*.025;
    // 头
    a.head.rotation.y=Math.sin(t*.55+p)*.11;
    a.head.position.y=(a.isCtrl?1.6:1.6)+Math.sin(t*.8+p)*.014;
    // 手臂
    if(a.working){
      a.arms[0].rotation.z=.22+Math.sin(t*2.5+p)*.35;
      a.arms[1].rotation.z=-.22-Math.sin(t*2.5+p)*.35;
      a.arms[0].rotation.x=Math.sin(t*1.8+p)*.22-.18;
      a.g.position.y=Math.sin(t*3+p)*.025;
    } else {
      a.arms[0].rotation.z=.2+Math.sin(t*.8+p)*.1;
      a.arms[1].rotation.z=-.2-Math.sin(t*.8+p)*.1;
      a.arms[0].rotation.x=0; a.g.position.y=Math.sin(t*.65+p)*.035;
    }
    a.halo.rotation.y=t*(a.isCtrl?.8:.5)+p;
    a.halo.position.y=(a.isCtrl?2.06:1.92)+Math.sin(t*1.2+p)*.03;
    a.beam.material.opacity=.018+Math.sin(t*1.8+p)*.012+(a.working?.025:0);
    a.plat.rotation.y=-t*.28;
    a.nameTag.lookAt(camera.position);
  });
  updateBeams();
  const ca=t*.035;
  camera.position.x=Math.sin(ca)*1.5;
  camera.position.z=11+Math.cos(ca)*.4;
  camera.lookAt(0,2,0);
  renderer.render(scene,camera);
}

// ═════════════════════════════════════════════
// 加载角色
// ═════════════════════════════════════════════
async function loadAndBuild(){
  const res=await fetch('/roles');
  roles=await res.json();
  // 清理旧
  Object.values(agentMap).forEach(a=>scene.remove(a.g));
  agentMap={};

  const ctrl=roles.find(r=>r.is_controller);
  const subs=roles.filter(r=>!r.is_controller);

  if(ctrl){
    const obj=buildAgent(ctrl,new THREE.Vector3(0,0,0),0xffd700,true);
    agentMap[ctrl.id]=obj;
  }
  subs.forEach((r,i)=>{
    const total=subs.length||1;
    const ang=(i/total)*Math.PI*2-Math.PI/2;
    const rad=Math.min(4.5,2.2+total*.35);
    const x=Math.cos(ang)*rad, z=Math.sin(ang)*rad;
    const obj=buildAgent(r,new THREE.Vector3(x,0,z),COLORS[(i+1)%COLORS.length],false);
    agentMap[r.id]=obj;
  });
  renderHud();
  if(!ctrl) showFloat('⚠️ 请在管理台设置主控角色');
}

// ═════════════════════════════════════════════
// 启动
// ═════════════════════════════════════════════
async function init(){
  initThree(); renderWF(-1);
  await loadAndBuild();
  connectSSE(); animate();
  setTimeout(()=>{
    document.getElementById('loading').classList.add('hide');
    const ctrl=roles.find(r=>r.is_controller);
    if(ctrl) showFloat(`👑 ${ctrl.name} 就位，点击「下达指令」开始`);
    else if(roles.length) showFloat(`已加载 ${roles.length} 名成员`);
    else showFloat('请先在管理台添加角色');
  },800);
}
init();
</script>
