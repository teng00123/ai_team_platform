<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Team - Command Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050a14;color:#e2e8f8;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;height:100vh}
canvas{position:fixed;inset:0;width:100%;height:100%}

/* Loading */
#loading{position:fixed;inset:0;background:#050a14;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .6s}
#loading.hide{opacity:0;pointer-events:none}
.load-ring{width:52px;height:52px;border:3px solid rgba(96,165,250,.15);
  border-top:3px solid #60a5fa;border-radius:50%;animation:spin .9s linear infinite}
.load-text{font-size:.78rem;color:#334155;letter-spacing:.1em;text-transform:uppercase}
@keyframes spin{to{transform:rotate(360deg)}}

/* Top bar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;height:56px;
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  background:linear-gradient(180deg,rgba(5,10,20,.98) 0%,rgba(5,10,20,.0) 100%)}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-dot{width:8px;height:8px;border-radius:50%;background:#60a5fa;
  box-shadow:0 0 8px #60a5fa;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tb-title{font-size:.9rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  background:linear-gradient(90deg,#60a5fa,#a78bfa,#60a5fa);
  background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
.tb-sep{color:#1e3050;font-size:.7rem}
.tb-sub{font-size:.68rem;color:#334155;letter-spacing:.06em}
.tb-btns{display:flex;gap:8px}
.tb-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:#64748b;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:.72rem;
  font-family:inherit;letter-spacing:.04em;transition:all .25s}
.tb-btn:hover{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.4);color:#93c5fd}
.tb-btn.gold{border-color:rgba(245,158,11,.35);color:#f59e0b;background:rgba(245,158,11,.06)}
.tb-btn.gold:hover{background:rgba(245,158,11,.14);border-color:#f59e0b}

/* HUD - agent cards left */
.hud{position:fixed;left:20px;top:72px;z-index:40;display:flex;flex-direction:column;gap:6px;max-width:180px}
.hc{background:rgba(8,15,30,.75);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:9px 12px;backdrop-filter:blur(12px);
  transition:all .3s;cursor:default}
.hc.ctrl{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.04)}
.hc.running{border-color:rgba(124,58,237,.5);background:rgba(124,58,237,.06);
  box-shadow:0 0 12px rgba(124,58,237,.15)}
.hc.done{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.04)}
.hc-name{font-size:.74rem;font-weight:600;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hc-badge{margin-top:4px;display:inline-block;font-size:.6rem;padding:2px 7px;border-radius:999px;font-weight:600;letter-spacing:.03em}
.hc-idle{background:rgba(255,255,255,.05);color:#475569}
.hc-running{background:rgba(124,58,237,.2);color:#a78bfa;animation:pulse-b .7s ease-in-out infinite alternate}
.hc-done{background:rgba(16,185,129,.15);color:#34d399}
.hc-failed{background:rgba(239,68,68,.15);color:#f87171}
@keyframes pulse-b{from{opacity:.6}to{opacity:1}}

/* Command panel */
#cmd-panel{position:fixed;right:24px;top:68px;z-index:50;width:300px;
  background:rgba(6,12,26,.96);border:1px solid rgba(245,158,11,.25);
  border-radius:16px;padding:20px;backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,.6);display:none;
  animation:slide-in .25s ease-out}
#cmd-panel.show{display:block}
@keyframes slide-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.cp-title{font-size:.82rem;font-weight:700;color:#f59e0b;margin-bottom:14px;letter-spacing:.04em}
.cp-lbl{font-size:.68rem;color:#475569;margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
.cp-ta{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:#e2e8f8;padding:10px 12px;border-radius:10px;font-size:.78rem;font-family:inherit;
  resize:vertical;min-height:80px;line-height:1.6;transition:border-color .2s}
.cp-ta:focus{outline:none;border-color:rgba(96,165,250,.4)}
.cp-btn{width:100%;margin-top:12px;padding:10px;border:none;border-radius:10px;cursor:pointer;
  font-size:.8rem;font-weight:700;font-family:inherit;letter-spacing:.04em;
  background:linear-gradient(135deg,#3b82f6,#7c3aed);color:#fff;
  box-shadow:0 4px 16px rgba(79,110,247,.35);transition:all .2s}
.cp-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,110,247,.45)}
.cp-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Result panel */
#result-panel{position:fixed;right:24px;top:68px;z-index:50;width:320px;max-height:75vh;
  background:rgba(6,12,26,.96);border:1px solid rgba(96,165,250,.18);
  border-radius:16px;padding:18px;backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,.6);display:none;overflow-y:auto;
  animation:slide-in .25s ease-out}
#result-panel.show{display:block}
.rp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.rp-title{font-size:.8rem;font-weight:700;color:#60a5fa;letter-spacing:.04em}
.rp-close{background:none;border:none;color:#334155;cursor:pointer;font-size:.9rem;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:all .2s}
.rp-close:hover{background:rgba(255,255,255,.08);color:#94a3b8}
.sub-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:11px 13px;margin-bottom:8px;transition:all .3s}
.sub-card.running{border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.05);
  box-shadow:0 0 16px rgba(124,58,237,.1)}
.sub-card.done{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.03)}
.sub-card.failed{border-color:rgba(239,68,68,.25)}
.sc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.sc-name{font-size:.75rem;font-weight:600;color:#cbd5e1}
.sc-badge{font-size:.6rem;padding:2px 8px;border-radius:999px;font-weight:600}
.sc-pending{background:rgba(255,255,255,.06);color:#475569}
.sc-running{background:rgba(124,58,237,.2);color:#a78bfa;animation:pulse-b .7s ease-in-out infinite alternate}
.sc-done{background:rgba(16,185,129,.15);color:#34d399}
.sc-failed{background:rgba(239,68,68,.15);color:#f87171}
.sc-task{font-size:.68rem;color:#4a5568;margin-bottom:5px;line-height:1.5}
.sc-result{font-size:.68rem;color:#7a8ea8;line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.sc-dots{display:flex;gap:4px;padding:2px 0;align-items:center}
.sc-dots span{width:5px;height:5px;border-radius:50%;animation:bounce-d .8s ease-in-out infinite}
.sc-dots span:nth-child(1){background:#60a5fa}
.sc-dots span:nth-child(2){background:#a78bfa;animation-delay:.15s}
.sc-dots span:nth-child(3){background:#34d399;animation-delay:.3s}
@keyframes bounce-d{0%,100%{transform:translateY(0);opacity:.35}50%{transform:translateY(-4px);opacity:1}}
.summary-box{margin-top:10px;padding:12px;background:rgba(16,185,129,.05);
  border:1px solid rgba(16,185,129,.15);border-radius:10px;font-size:.7rem;
  color:#94a3b8;line-height:1.7;white-space:pre-wrap;max-height:180px;overflow-y:auto;display:none}

/* Workflow bar */
.wf-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:linear-gradient(0deg,rgba(5,10,20,.98) 60%,rgba(5,10,20,.0) 100%);
  padding:20px 40px 18px;display:flex;align-items:center;justify-content:center;gap:10px}
.wf-step{font-size:.66rem;padding:5px 14px;border-radius:20px;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;transition:all .35s;
  background:rgba(255,255,255,.03);color:#1e3050;border:1px solid rgba(255,255,255,.05)}
.wf-step.active{background:rgba(124,58,237,.18);color:#a78bfa;
  border-color:rgba(124,58,237,.35);box-shadow:0 0 16px rgba(124,58,237,.2)}
.wf-step.done{background:rgba(16,185,129,.1);color:#34d399;border-color:rgba(16,185,129,.25)}
.wf-arrow{color:#0f1a30;font-size:.65rem}

/* Floating notification */
#notif{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:rgba(8,15,32,.92);border:1px solid rgba(96,165,250,.25);
  color:#93c5fd;padding:8px 22px;border-radius:999px;font-size:.74rem;font-weight:500;
  z-index:60;opacity:0;pointer-events:none;white-space:nowrap;
  backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.4);
  transition:opacity .35s,transform .35s}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(96,165,250,.2);border-radius:2px}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="loading">
  <div class="load-ring"></div>
  <div class="load-text">Initializing Scene</div>
</div>

<div class="topbar">
  <div class="tb-left">
    <div class="tb-dot"></div>
    <div class="tb-title">Command Center</div>
    <div class="tb-sep">|</div>
    <div class="tb-sub">Multi-Agent Orchestration</div>
  </div>
  <div class="tb-btns">
    <button class="tb-btn" onclick="window.open('/','_blank')">Admin Panel</button>
    <button class="tb-btn gold" onclick="toggleCmd()">Issue Command</button>
  </div>
</div>

<div class="hud" id="hud"></div>

<div id="cmd-panel">
  <div class="cp-title">Issue Command</div>
  <div class="cp-lbl">Task Description</div>
  <textarea class="cp-ta" id="cmd-input" placeholder="Describe the task for the controller to orchestrate..."></textarea>
  <button class="cp-btn" id="cmd-btn" onclick="submitCmd()">Send to Controller</button>
</div>

<div id="result-panel">
  <div class="rp-head">
    <div class="rp-title">Execution Status</div>
    <button class="rp-close" onclick="closeResult()">x</button>
  </div>
  <div id="sub-list"></div>
  <div class="summary-box" id="summary-box"></div>
</div>

<div class="wf-bar">
  <div class="wf-step" id="wf0">Analyze</div>
  <div class="wf-arrow">-&gt;</div>
  <div class="wf-step" id="wf1">Decompose</div>
  <div class="wf-arrow">-&gt;</div>
  <div class="wf-step" id="wf2">Dispatch</div>
  <div class="wf-arrow">-&gt;</div>
  <div class="wf-step" id="wf3">Execute</div>
  <div class="wf-arrow">-&gt;</div>
  <div class="wf-step" id="wf4">Summarize</div>
</div>

<div id="notif"></div>

<script src="/static/vendor/three.min.js"></script>
<script>
// ==============================================================
// Globals
// ==============================================================
var scene, camera, renderer, clock;
var roles = [];
var agentObjs = {};
var beams = [];
var particles = null;
var cameraAngle = 0;
var time = 0;

var ROLE_COLORS = [
  0x60a5fa, 0xa78bfa, 0x34d399, 0xfbbf24,
  0xf472b6, 0x38bdf8, 0xc084fc, 0xfb923c
];

// ==============================================================
// Three.js init
// ==============================================================
function initThree() {
  var canvas = document.getElementById('c');
  renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true, alpha: false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050a14);
  scene.fog = new THREE.FogExp2(0x050a14, 0.022);

  camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 7, 15);
  camera.lookAt(0, 0.5, 0);

  clock = new THREE.Clock();

  // Lights
  scene.add(new THREE.AmbientLight(0x0d1a2e, 4));

  var sun = new THREE.DirectionalLight(0xffffff, 1.8);
  sun.position.set(8, 14, 6);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 50;
  sun.shadow.camera.left = -12;
  sun.shadow.camera.right = 12;
  sun.shadow.camera.top = 12;
  sun.shadow.camera.bottom = -12;
  scene.add(sun);

  var fill = new THREE.DirectionalLight(0x1a4080, 0.8);
  fill.position.set(-6, 4, -6);
  scene.add(fill);

  var rimBlue = new THREE.PointLight(0x3b82f6, 3, 18);
  rimBlue.position.set(-7, 5, 2);
  scene.add(rimBlue);

  var rimPurple = new THREE.PointLight(0x7c3aed, 2, 16);
  rimPurple.position.set(6, 4, -4);
  scene.add(rimPurple);

  var rimTeal = new THREE.PointLight(0x0ea5e9, 1.5, 14);
  rimTeal.position.set(0, 2, 8);
  scene.add(rimTeal);

  // Ground plane (reflective)
  var groundGeo = new THREE.PlaneGeometry(60, 60);
  var groundMat = new THREE.MeshStandardMaterial({
    color: 0x060c18,
    roughness: 0.15,
    metalness: 0.85
  });
  var ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -1.3;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid overlay
  var grid = new THREE.GridHelper(40, 40, 0x0d1f3a, 0x0a1628);
  grid.position.y = -1.28;
  scene.add(grid);

  // Starfield
  buildStars();

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function buildStars() {
  var count = 600;
  var geo = new THREE.BufferGeometry();
  var pos = new Float32Array(count * 3);
  for (var i = 0; i < count; i++) {
    pos[i * 3] = (Math.random() - 0.5) * 80;
    pos[i * 3 + 1] = Math.random() * 30 + 2;
    pos[i * 3 + 2] = (Math.random() - 0.5) * 80;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  var mat = new THREE.PointsMaterial({color: 0x60a5fa, size: 0.06, transparent: true, opacity: 0.6});
  scene.add(new THREE.Points(geo, mat));
}

// ==============================================================
// Agent character builder - enhanced sci-fi mech style
// ==============================================================
function buildAgent(colorHex, isCtrl) {
  var g = new THREE.Group();
  var c = colorHex;
  var cv = new THREE.Color(c);

  // Material palette
  var armorMat  = new THREE.MeshStandardMaterial({color: c, roughness: 0.28, metalness: 0.72});
  var armor2Mat = new THREE.MeshStandardMaterial({color: new THREE.Color(c).multiplyScalar(0.55), roughness: 0.22, metalness: 0.9});
  var darkMat   = new THREE.MeshStandardMaterial({color: 0x0b1120, roughness: 0.55, metalness: 0.6});
  var midMat    = new THREE.MeshStandardMaterial({color: 0x1a2540, roughness: 0.4, metalness: 0.7});
  var glowMat   = new THREE.MeshStandardMaterial({color: c, emissive: cv, emissiveIntensity: 1.0, roughness: 0.05, metalness: 0.95});
  var coreGlow  = new THREE.MeshStandardMaterial({color: 0xffffff, emissive: cv, emissiveIntensity: 3.0, roughness: 0, metalness: 1});
  var visorMat  = new THREE.MeshStandardMaterial({color: c, emissive: cv, emissiveIntensity: 0.9, roughness: 0.05, metalness: 1, transparent: true, opacity: 0.82});

  // ── TORSO ──────────────────────────────────────────────
  // Main body capsule
  var torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.28, 0.38, 6, 12), armorMat);
  torso.position.y = 0.22;
  g.add(torso);

  // Chest center ridge
  var ridge = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.07), armor2Mat);
  ridge.position.set(0, 0.26, 0.26);
  g.add(ridge);

  // Chest plate left/right panels
  [-1, 1].forEach(function(s) {
    var panel = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.18, 0.06), armor2Mat);
    panel.position.set(s * 0.13, 0.28, 0.25);
    panel.rotation.y = s * 0.08;
    g.add(panel);
    // Panel edge glow strip
    var strip = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.14, 0.02), glowMat);
    strip.position.set(s * 0.2, 0.28, 0.26);
    g.add(strip);
  });

  // Arc reactor core
  var reactor = new THREE.Mesh(new THREE.CylinderGeometry(0.065, 0.065, 0.04, 16), coreGlow);
  reactor.rotation.x = Math.PI / 2;
  reactor.position.set(0, 0.28, 0.29);
  g.add(reactor);
  // Reactor ring
  var reactRing = new THREE.Mesh(new THREE.TorusGeometry(0.065, 0.012, 6, 20), glowMat);
  reactRing.rotation.x = Math.PI / 2;
  reactRing.position.set(0, 0.28, 0.3);
  g.add(reactRing);

  // Waist belt
  var belt = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.24, 0.1, 10), darkMat);
  belt.position.y = -0.1;
  g.add(belt);
  // Belt buckle
  var buckle = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.07, 0.07), glowMat);
  buckle.position.set(0, -0.1, 0.24);
  g.add(buckle);

  // ── NECK ───────────────────────────────────────────────
  var neck = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.13, 0.1, 8), midMat);
  neck.position.y = 0.61;
  g.add(neck);
  // Collar ring
  var collar = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.025, 6, 16), armor2Mat);
  collar.position.y = 0.62;
  g.add(collar);

  // ── HEAD ───────────────────────────────────────────────
  // Skull base (slightly flattened sphere)
  var skull = new THREE.Mesh(new THREE.SphereGeometry(0.285, 22, 16), midMat);
  skull.position.y = 0.96;
  skull.scale.set(1, 1.08, 1);
  g.add(skull);

  // Helmet top dome (armor layer)
  var helmetTop = new THREE.Mesh(new THREE.SphereGeometry(0.295, 18, 10, 0, Math.PI * 2, 0, Math.PI * 0.52), armorMat);
  helmetTop.position.y = 0.96;
  helmetTop.scale.set(1, 1.08, 1);
  g.add(helmetTop);

  // Helmet side panels
  [-1, 1].forEach(function(s) {
    var side = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.22, 0.28), armor2Mat);
    side.position.set(s * 0.27, 0.94, 0.04);
    side.rotation.y = s * 0.15;
    g.add(side);
    // Temple glow dot
    var dot = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), glowMat);
    dot.position.set(s * 0.29, 0.96, 0.1);
    g.add(dot);
  });

  // Helmet forehead bar
  var fbar = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.06, 0.05), armor2Mat);
  fbar.position.set(0, 1.12, 0.25);
  g.add(fbar);

  // Visor (large glowing eye slit)
  var visor = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.1, 0.04), visorMat);
  visor.position.set(0, 0.97, 0.26);
  visor.rotation.y = 0;
  g.add(visor);
  // Visor inner glow line
  var visorLine = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.03, 0.02), coreGlow);
  visorLine.position.set(0, 0.97, 0.28);
  g.add(visorLine);

  // Chin guard
  var chin = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.1, 0.1), darkMat);
  chin.position.set(0, 0.82, 0.2);
  g.add(chin);

  // ── SHOULDERS ─────────────────────────────────────────
  [-1, 1].forEach(function(s) {
    // Pauldron main
    var pMain = new THREE.Mesh(new THREE.SphereGeometry(0.18, 14, 10, 0, Math.PI * 2, 0, Math.PI * 0.65), armorMat);
    pMain.position.set(s * 0.46, 0.42, 0);
    pMain.rotation.z = s * (Math.PI / 2);
    g.add(pMain);
    // Pauldron detail strip
    var pStrip = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.16, 0.06), glowMat);
    pStrip.position.set(s * 0.48, 0.38, 0.06);
    g.add(pStrip);
    // Shoulder glow dot
    var sDot = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 8), coreGlow);
    sDot.position.set(s * 0.5, 0.45, 0.08);
    g.add(sDot);
  });

  // ── UPPER ARMS ────────────────────────────────────────
  [-1, 1].forEach(function(s) {
    var ua = new THREE.Mesh(new THREE.CapsuleGeometry(0.075, 0.25, 4, 8), armor2Mat);
    ua.position.set(s * 0.48, 0.2, 0);
    ua.rotation.z = s * 0.22;
    g.add(ua);
    // Elbow guard
    var elbow = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 8), armorMat);
    elbow.position.set(s * 0.52, 0.04, 0);
    g.add(elbow);
    // Forearm
    var fa = new THREE.Mesh(new THREE.CapsuleGeometry(0.065, 0.22, 4, 8), midMat);

    // Shin armor front
    var sPlate = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.07), armor2Mat);
    sPlate.position.set(s * 0.14, -0.72, 0.1);
    g.add(sPlate);
    // Boot
    var boot = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.3), darkMat);
    boot.position.set(s * 0.14, -0.92, 0.04);

    // Boot glow stripe
    var bStripe = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.07, 0.26), glowMat);
    bStripe.position.set(s * 0.18, -0.92, 0.04);
    g.add(bStripe);

  // ── BACK PACK / JETPACK ────────────────────────────────
  var pack = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.34, 0.16), armor2Mat);
  pack.position.set(0, 0.2, -0.3);

  // Thruster nozzles
  [-1, 1].forEach(function(s) {

  // ── CONTROLLER CROWN (upggraded) ───────────────────────

    cSpike.position.y = 1.55;
    g.add(cSpike);
    // Center gem (large)
    var cGem = new THREE.Mesh(new THREE.OctahedronGeometry(0.065), gemMat);

    g.add(cGem);
    // Outer aura ring
    var aura = new THREE.Mesh(new THREE.TorusGeometry(0.42, 0.012, 6, 32), new THREE.MeshStandardMaterial({
      color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 1.5, transparent: true, opacity: 0.6
    }));
    aura.position.y = 1.34;
    aura.rotation.x = 0.3;
    g.add(aura);
  } else {
    // Sub-agent rank badge (small plate on forehead)

  }

  // ── FOOT GLOW RING ─────────────────────────────────────
  var footRing = new THREE.Mesh(
    new THREE.TorusGeometry(0.28, 0.018, 8, 40),
    new THREE.MeshStandardMaterial({color: c, emissive: cv, emissiveIntensity: 1.4,
      transparent: true, opacity: 0.8, roughness: 0.05, metalness: 0.95})
  );
  footRing.rotation.x = Math.PI / 2;
  footRing.position.y = -0.98;
  g.add(footRing);

  g.traverse(function(o) { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
  return g;
}

// ==============================================================
// Platform builder
// ==============================================================
function buildPlatform(x, z, isCtrl, color) {
  var g = new THREE.Group();
  var mat = isCtrl
    ? new THREE.MeshStandardMaterial({color: 0xffd700, emissive: 0xd97706, emissiveIntensity: 0.25, roughness: 0.15, metalness: 0.95})
    : new THREE.MeshStandardMaterial({color: 0x0d1f3a, emissive: new THREE.Color(color), emissiveIntensity: 0.05, roughness: 0.3, metalness: 0.8});

  var disc = new THREE.Mesh(isCtrl ? new THREE.CylinderGeometry(1.2, 1.4, 0.12, 6) : new THREE.CylinderGeometry(0.8, 0.9, 0.1, 8), mat);
  disc.receiveShadow = true;
  g.add(disc);

  // Edge ring glow
  var edge = new THREE.Mesh(
    new THREE.TorusGeometry(isCtrl ? 1.3 : 0.85, 0.025, 8, 40),
    new THREE.MeshStandardMaterial({color: isCtrl ? 0xffd700 : color, emissive: new THREE.Color(isCtrl ? 0xffd700 : color), emissiveIntensity: 1.5,
      transparent: true, opacity: 0.9})
  );
  edge.rotation.x = Math.PI / 2;
  g.add(edge);

  g.position.set(x, -1.25, z);
  scene.add(g);
  return g;
}

// ==============================================================
// Beam builder (energy connection lines)
// ==============================================================
function buildBeam(from, to, color) {
  var dir = new THREE.Vector3().subVectors(to, from);
  var len = dir.length();
  var geo = new THREE.CylinderGeometry(0.02, 0.02, len, 6);
  var mat = new THREE.MeshBasicMaterial({color: color, transparent: true, opacity: 0.22});
  var mesh = new THREE.Mesh(geo, mat);
  var mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
  mesh.position.copy(mid);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
  scene.add(mesh);
  return mesh;
}

// Particle stream along a beam
function buildParticleStream(from, to, color) {
  var count = 18;
  var geo = new THREE.BufferGeometry();
  var pos = new Float32Array(count * 3);
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  var mat = new THREE.PointsMaterial({color: color, size: 0.07, transparent: true, opacity: 0.8});
  var pts = new THREE.Points(geo, mat);
  scene.add(pts);
  return {pts: pts, from: from.clone(), to: to.clone(), count: count, offsets: Array.from({length: count}, function(_, i) { return i / count; })};
}

// ==============================================================
// Build full scene
// ==============================================================
function buildScene() {
  Object.values(agentObjs).forEach(function(a) {
    scene.remove(a.group);
    scene.remove(a.platform);
  });
  agentObjs = {};
  beams.forEach(function(b) { scene.remove(b.mesh || b); });
  beams = [];

  var ctrl = roles.find(function(r) { return r.is_controller; });
  var subs = roles.filter(function(r) { return !r.is_controller; });

  if (ctrl) {
    buildPlatform(0, 0, true, 0xffd700);
    var g = buildAgent(0xffd700, true);
    g.position.set(0, 0, 0);
    scene.add(g);
    agentObjs[ctrl.id] = {group: g, role: ctrl, status: 'idle'};
  }

  subs.forEach(function(r, i) {
    var total = Math.max(subs.length, 1);
    var ang = (i / total) * Math.PI * 2 - Math.PI / 2;
    var rad = Math.min(5.5, 3.2 + total * 0.35);
    var x = Math.cos(ang) * rad;
    var z = Math.sin(ang) * rad;
    var color = ROLE_COLORS[(i + 1) % ROLE_COLORS.length];
    buildPlatform(x, z, false, color);
    var g = buildAgent(color, false);
    g.position.set(x, 0, z);
    g.lookAt(0, 0, 0);
    scene.add(g);
    agentObjs[r.id] = {group: g, role: r, status: 'idle', pos: new THREE.Vector3(x, 0.5, z), color: color};

    if (ctrl) {
      var bm = buildBeam(new THREE.Vector3(0, 0.5, 0), new THREE.Vector3(x, 0.5, z), color);
      var ps = buildParticleStream(new THREE.Vector3(0, 0.5, 0), new THREE.Vector3(x, 0.5, z), color);
      beams.push({mesh: bm, stream: ps, color: color, active: false});
    }
  });

  renderHud();
}

// ==============================================================
// Animate loop
// ==============================================================
function animate() {
  requestAnimationFrame(animate);
  var dt = clock.getDelta();
  time += dt;

  // Camera orbit
  cameraAngle += dt * 0.07;
  camera.position.x = Math.sin(cameraAngle) * 15;
  camera.position.z = Math.cos(cameraAngle) * 15;
  camera.position.y = 7 + Math.sin(cameraAngle * 0.3) * 0.5;
  camera.lookAt(0, 0.5, 0);

  // Animate characters (idle bob + head sway)
  var idx = 0;
  Object.values(agentObjs).forEach(function(a) {
    var g = a.group;
    g.position.y = Math.sin(time * 0.7 + idx * 1.1) * 0.06;
    // Subtle scale pulse when running
    if (a.status === 'running') {
      var s = 1 + Math.sin(time * 3 + idx) * 0.02;
      g.scale.set(s, s, s);
    } else {
      g.scale.set(1, 1, 1);
    }
    idx++;
  });

  // Animate particle streams
  beams.forEach(function(b, bi) {
    if (!b.stream) return;
    var ps = b.stream;
    var posArr = ps.pts.geometry.attributes.position.array;
    ps.offsets.forEach(function(off, i) {
      ps.offsets[i] = (off + dt * (b.active ? 1.2 : 0.3)) % 1.0;
      var t2 = ps.offsets[i];
      posArr[i * 3] = ps.from.x + (ps.to.x - ps.from.x) * t2;
      posArr[i * 3 + 1] = ps.from.y + (ps.to.y - ps.from.y) * t2 + Math.sin(t2 * Math.PI * 2) * 0.12;
      posArr[i * 3 + 2] = ps.from.z + (ps.to.z - ps.from.z) * t2;
    });
    ps.pts.geometry.attributes.position.needsUpdate = true;
    ps.pts.material.opacity = b.active ? 0.9 + Math.sin(time * 4 + bi) * 0.1 : 0.35;
    if (b.mesh) {
      b.mesh.material.opacity = b.active ? 0.45 + Math.sin(time * 2 + bi) * 0.1 : 0.12;
    }
  });

  renderer.render(scene, camera);
}

// ==============================================================
// UI
// ==============================================================
function renderHud() {
  var hud = document.getElementById('hud');
  hud.innerHTML = roles.map(function(r, i) {
    var a = agentObjs[r.id];
    var status = a ? a.status : 'idle';
    var labels = {idle: 'Idle', running: 'Running', done: 'Done', failed: 'Failed'};
    var cls = {idle: 'hc-idle', running: 'hc-running', done: 'hc-done', failed: 'hc-failed'};
    return '<div class="hc ' + (r.is_controller ? 'ctrl' : status === 'running' ? 'running' : status === 'done' ? 'done' : '') + '">' +
      '<div class="hc-name">' + (r.is_controller ? '[C] ' : '') + r.name + '</div>' +
      '<span class="hc-badge ' + (cls[status] || 'hc-idle') + '">' + (labels[status] || status) + '</span>' +
      '</div>';
  }).join('');
}

function showNotif(msg, dur) {
  var el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.remove('show'); }, dur || 3000);
}

function setWfStep(step) {
  var map = {analyzing: 0, planned: 1, dispatching: 2, executing: 3, summarizing: 4, done: 5};
  var idx = typeof map[step] !== 'undefined' ? map[step] : -1;
  for (var i = 0; i <= 4; i++) {
    var el = document.getElementById('wf' + i);
    if (!el) continue;
    el.className = 'wf-step' + (i < idx ? ' done' : i === idx ? ' active' : '');
  }
}

function toggleCmd() {
  var cp = document.getElementById('cmd-panel');
  var rp = document.getElementById('result-panel');
  rp.classList.remove('show');
  cp.classList.toggle('show');
}

function closeResult() {
  document.getElementById('result-panel').classList.remove('show');
}

function updateSubCard(data) {
  var key = 'sc_' + (data.role_id || data.role_name || '').replace(/[^a-z0-9]/gi, '_');
  var el = document.getElementById(key);
  if (!el) {
    el = document.createElement('div');
    el.id = key;
    document.getElementById('sub-list').appendChild(el);
  }
  var s = data.status || 'pending';
  el.className = 'sub-card ' + s;
  var lbl = {pending: 'Pending', running: 'Running', done: 'Done', failed: 'Failed'}[s] || s;
  var bc = 'sc-badge sc-' + s;
  var resHtml = s === 'running'
    ? '<div class="sc-dots"><span></span><span></span><span></span></div>'
    : (data.result
      ? '<div class="sc-result">' + data.result.substring(0, 280) + (data.result.length > 280 ? '...' : '') + '</div>'
      : '');
  el.innerHTML = '<div class="sc-head"><span class="sc-name">' + (data.role_name || '') + '</span><span class="' + bc + '">' + lbl + '</span></div>' +
    '<div class="sc-task">' + (data.sub_task || '') + '</div>' + resHtml;

  // Sync agent status + beam activation
  Object.keys(agentObjs).forEach(function(id) {
    if (agentObjs[id].role && agentObjs[id].role.id === data.role_id) {
      agentObjs[id].status = s;
    }
  });
  // Activate beam for running role
  beams.forEach(function(b) {
    if (b.stream && b.stream.to) {
      // simple heuristic: activate all when any running
    }
  });
  if (s === 'running') {
    beams.forEach(function(b) { b.active = true; });
  }
  renderHud();
}

// ==============================================================
// SSE
// ==============================================================
var sse = null;
function connectSSE() {
  if (sse) sse.close();
  sse = new EventSource('/events');
  sse.onmessage = function(e) {
    var ev;
    try { ev = JSON.parse(e.data); } catch(err) { return; }
    if (!ev || ev.type === 'ping') return;
    var d = ev.data || {};

    if (ev.type === 'orchestration_start') {
      document.getElementById('result-panel').classList.add('show');
      document.getElementById('sub-list').innerHTML = '';
      document.getElementById('summary-box').style.display = 'none';
      setWfStep('analyzing');
      showNotif('Controller is orchestrating...');
      beams.forEach(function(b) { b.active = false; });
    } else if (ev.type === 'orchestration_step') {
      if (d.step) setWfStep(d.step);
    } else if (ev.type === 'sub_task_update') {
      updateSubCard(d);
    } else if (ev.type === 'orchestration_done') {
      setWfStep('done');
      showNotif('All agents completed!', 4000);
      beams.forEach(function(b) { b.active = false; });
      if (d.summary) {
        var sb = document.getElementById('summary-box');
        sb.textContent = d.summary;
        sb.style.display = 'block';
      }
    }
  };
  sse.onerror = function() {
    setTimeout(connectSSE, 4000);
  };
}

// ==============================================================
// Submit command
// ==============================================================
async function submitCmd() {
  var ctrl = roles.find(function(r) { return r.is_controller; });
  if (!ctrl) { showNotif('No controller role configured.'); return; }
  var msg = document.getElementById('cmd-input').value.trim();
  if (!msg) { showNotif('Please enter a task.'); return; }

  var btn = document.getElementById('cmd-btn');
  btn.disabled = true; btn.textContent = 'Processing...';
  document.getElementById('cmd-panel').classList.remove('show');
  document.getElementById('result-panel').classList.add('show');
  document.getElementById('sub-list').innerHTML =
    '<div style="color:#334155;font-size:.72rem;padding:8px">Waiting for controller to dispatch tasks...</div>';
  document.getElementById('summary-box').style.display = 'none';
  setWfStep('analyzing');
  showNotif('Command sent to controller');
  beams.forEach(function(b) { b.active = true; });

  try {
    var res = await fetch('/orchestrate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({controller_id: ctrl.id, message: msg})
    });
    var task = await res.json();
    if (task.sub_tasks && task.sub_tasks.length) {
      document.getElementById('sub-list').innerHTML = '';
      task.sub_tasks.forEach(function(st) { updateSubCard(st); });
    }
    if (task.result) {
      var sb = document.getElementById('summary-box');
      sb.textContent = task.result;
      sb.style.display = 'block';
    }
    setWfStep('done');
    showNotif('Orchestration complete!', 4000);
  } catch(err) {
    showNotif('Error: ' + err.message);
  }
  beams.forEach(function(b) { b.active = false; });
  btn.disabled = false; btn.textContent = 'Send to Controller';
}

// ==============================================================
// Init
// ==============================================================
async function init() {
  try {
    initThree();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<div style="color:#ef4444;font-size:.82rem">3D init failed: ' + e.message + '</div>';
    return;
  }

  try {
    var res = await fetch('/roles');
    roles = await res.json();
  } catch(e) { roles = []; }

  buildScene();
  animate();
  connectSSE();

  // Hide loading
  var loadEl = document.getElementById('loading');
  loadEl.classList.add('hide');
  setTimeout(function() { loadEl.style.display = 'none'; }, 700);

  var ctrl = roles.find(function(r) { return r.is_controller; });
  if (ctrl) showNotif('Controller [' + ctrl.name + '] is ready');
  else if (roles.length) showNotif(roles.length + ' agents loaded');
  else showNotif('No roles yet - add some in Admin');
}

init();
