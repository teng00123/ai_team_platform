<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Team Platform</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;--surface:#fff;--surface2:#f8faff;
  --border:#e2e8f8;--border2:#c8d5f5;
  --primary:#4f6ef7;--primary2:#7c3aed;
  --gold:#f59e0b;--gold2:#fbbf24;
  --success:#10b981;--danger:#ef4444;--warn:#f59e0b;
  --text:#1a1f3a;--text2:#4a5578;--muted:#8896b3;
  --shadow:0 2px 16px rgba(79,110,247,.1);
  --shadow2:0 8px 32px rgba(79,110,247,.18);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* 背景装饰 */
body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;
  background:radial-gradient(circle,rgba(79,110,247,.12),transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-150px;left:-150px;width:400px;height:400px;
  background:radial-gradient(circle,rgba(124,58,237,.08),transparent 70%);pointer-events:none;z-index:0}

/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:0 32px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 12px rgba(79,110,247,.08)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  box-shadow:0 4px 12px rgba(79,110,247,.3)}
.logo-text{font-family:'Sora',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text)}
.logo-sub{font-size:.7rem;color:var(--muted);font-weight:400}
.badge-pill{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;
  font-size:.65rem;padding:3px 10px;border-radius:999px;font-weight:600;letter-spacing:.04em}
nav{display:flex;gap:8px;align-items:center}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--text2);
  padding:7px 16px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:500;
  transition:all .2s;font-family:inherit}
.nav-btn:hover{border-color:var(--primary);color:var(--primary);background:rgba(79,110,247,.05)}
.nav-btn.scene{background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(79,110,247,.3)}
.nav-btn.scene:hover{opacity:.88}

/* Main */
main{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:28px 24px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:20px 22px;display:flex;align-items:center;gap:16px;
  box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow2)}
.stat-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:1.4rem;flex-shrink:0}
.stat-icon.blue{background:linear-gradient(135deg,#eff3ff,#dde6ff)}
.stat-icon.purple{background:linear-gradient(135deg,#f3f0ff,#e5d8ff)}
.stat-icon.green{background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.stat-icon.amber{background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.stat-label{font-size:.72rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.stat-value{font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:700;color:var(--text);line-height:1.1}
.stat-sub{font-size:.72rem;color:var(--muted)}

/* Layout */
.layout{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}

/* Section title */
.sec-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* 角色卡片 */
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:16px}
.role-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;
  padding:20px 16px 16px;text-align:center;cursor:pointer;position:relative;
  transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.role-card:hover{border-color:var(--primary);transform:translateY(-4px);
  box-shadow:0 12px 32px rgba(79,110,247,.15)}
.role-card.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.15)}
.role-card.is-ctrl{border-color:var(--gold);background:linear-gradient(145deg,#fffdf0,#fff8e1);}
.role-card.is-ctrl:hover{border-color:var(--gold2);box-shadow:0 12px 32px rgba(245,158,11,.2)}

/* 主控标签 */
.ctrl-badge{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#fff;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:999px;
  box-shadow:0 2px 8px rgba(245,158,11,.4);letter-spacing:.04em}

/* 头像圆 */
.avatar-ring{width:80px;height:80px;margin:0 auto 12px;position:relative}
.avatar-ring canvas{width:80px;height:80px;border-radius:50%}
.avatar-ring::after{content:'';position:absolute;inset:-3px;border-radius:50%;
  border:2px solid transparent;background:linear-gradient(135deg,var(--primary),var(--primary2)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude}
.role-card.is-ctrl .avatar-ring::after{background:linear-gradient(135deg,var(--gold),var(--gold2)) border-box}
.online-dot{position:absolute;bottom:4px;right:4px;width:12px;height:12px;
  border-radius:50%;background:var(--success);border:2px solid #fff;z-index:2}

.role-name{font-weight:700;font-size:.95rem;color:var(--text);margin-bottom:4px}
.role-tag{display:inline-block;background:rgba(79,110,247,.08);color:var(--primary);
  font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:999px;margin-bottom:8px}
.role-card.is-ctrl .role-tag{background:rgba(245,158,11,.12);color:var(--gold)}
.role-desc{font-size:.75rem;color:var(--muted);line-height:1.5;min-height:2.2em;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.role-actions{display:flex;gap:6px;margin-top:12px;justify-content:center}
.btn-xs{padding:5px 12px;border-radius:8px;font-size:.72rem;font-weight:600;
  border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-assign{background:rgba(79,110,247,.1);color:var(--primary)}
.btn-assign:hover{background:rgba(79,110,247,.2)}
.btn-cmd{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(251,191,36,.1));color:var(--gold)}
.btn-cmd:hover{background:rgba(245,158,11,.25)}
.btn-del{background:rgba(239,68,68,.08);color:var(--danger)}
.btn-del:hover{background:rgba(239,68,68,.16)}

.empty-grid{text-align:center;padding:52px 20px;color:var(--muted);grid-column:1/-1}
.empty-grid .ei{font-size:3rem;margin-bottom:10px;opacity:.35}

/* 最近任务 */
.task-feed{display:flex;flex-direction:column;gap:8px;margin-top:24px;max-height:280px;overflow-y:auto}
.task-feed::-webkit-scrollbar{width:4px}
.task-feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;display:flex;align-items:center;gap:12px}
.task-item-left{flex:1;min-width:0}
.task-role{font-size:.78rem;font-weight:600;color:var(--primary)}
.task-msg{font-size:.78rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.task-time{font-size:.68rem;color:var(--muted);flex-shrink:0}
.status-pill{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:999px;flex-shrink:0}
.sp-done{background:#ecfdf5;color:#059669}
.sp-running{background:#eff6ff;color:#2563eb}
.sp-failed{background:#fef2f2;color:#dc2626}

/* Panel */
.panel{display:flex;flex-direction:column;gap:16px}
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:22px;box-shadow:var(--shadow)}

/* Form */
.form-label{font-size:.72rem;font-weight:600;color:var(--text2);letter-spacing:.04em;
  text-transform:uppercase;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);
  color:var(--text);border-radius:10px;padding:10px 14px;font-size:.875rem;
  outline:none;transition:border .2s,box-shadow .2s;font-family:inherit;margin-bottom:12px}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.1)}
textarea.form-input{resize:vertical;min-height:72px}

/* 主控 toggle */
.toggle-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;
  background:linear-gradient(135deg,#fffbeb,#fff8e1);border:1.5px solid #fde68a;
  border-radius:12px;padding:10px 14px}
.toggle-switch{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:#e2e8f8;border-radius:999px;
  cursor:pointer;transition:.3s}
.toggle-track.on{background:linear-gradient(135deg,var(--gold),var(--gold2))}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;
  background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle-track.on .toggle-thumb{left:21px}

/* 主控区块 */
.ctrl-block{background:linear-gradient(135deg,#fffdf0,#fff8e1);border:1.5px solid #fde68a;border-radius:16px;padding:14px 16px;margin-bottom:12px}
.ctrl-who{display:flex;align-items:center;gap:10px}
.ctrl-crown{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.ctrl-name{font-weight:700;font-size:.92rem;color:var(--text)}
.ctrl-role{font-size:.72rem;color:var(--gold)}

.btn-primary{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:#fff;border:none;padding:12px;border-radius:12px;font-weight:700;
  font-size:.88rem;cursor:pointer;font-family:inherit;transition:.2s;
  box-shadow:0 4px 14px rgba(79,110,247,.3);letter-spacing:.02em}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));
  box-shadow:0 4px 14px rgba(245,158,11,.3)}

/* 结果框 */
.result-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;
  padding:14px;font-size:.8rem;color:var(--text2);white-space:pre-wrap;
  max-height:200px;overflow-y:auto;display:none;margin-top:10px;line-height:1.7}
.result-box::-webkit-scrollbar{width:4px}
.result-box::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:#fff;padding:10px 20px;border-radius:12px;
  font-size:.83rem;font-weight:500;z-index:999;opacity:0;transition:.3s;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.2);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 子角色执行卡片 ── */
.sub-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:4px}
.sub-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
  padding:12px 14px;transition:all .3s;position:relative;overflow:hidden}
.sub-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--border);transition:background .3s}
.sub-card.sc-active{border-color:#818cf8;box-shadow:0 0 0 2px rgba(129,140,248,.2)}
.sub-card.sc-active::before{background:linear-gradient(90deg,#4f6ef7,#7c3aed,#4f6ef7);
  background-size:200px 100%;animation:scanline 1.5s linear infinite}
.sub-card.sc-fin{border-color:#6ee7b7}
.sub-card.sc-fin::before{background:var(--success)}
@keyframes scanline{0%{background-position:0 0}100%{background-position:200px 0}}

.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sc-name{font-size:.82rem;font-weight:600;color:var(--text)}
.sc-badge{font-size:.64rem;padding:2px 8px;border-radius:999px;font-weight:600;white-space:nowrap}
.sc-pending{background:#f1f5f9;color:var(--muted)}
.sc-running{background:#ede9fe;color:#7c3aed;animation:pulse-badge .8s ease-in-out infinite alternate}
.sc-done{background:#d1fae5;color:#059669}
.sc-failed{background:#fee2e2;color:#dc2626}
@keyframes pulse-badge{from{opacity:.7}to{opacity:1}}

.sc-task{font-size:.72rem;color:var(--text2);margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  line-height:1.5;min-height:2.2em}
.sc-result{min-height:32px}
.sc-result-text{font-size:.71rem;color:var(--text2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}

/* 思考动效 */
.sc-thinking{display:flex;gap:4px;align-items:center;padding:4px 0}
.sc-thinking .dot{width:6px;height:6px;border-radius:50%;background:var(--primary);
  animation:bounce-dot .9s ease-in-out infinite}
.sc-thinking .dot:nth-child(2){animation-delay:.2s;background:var(--primary2)}
.sc-thinking .dot:nth-child(3){animation-delay:.4s;background:var(--success)}
@keyframes bounce-dot{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-5px);opacity:1}}

/* 工作流步骤条 */
.wf-step{font-size:.64rem;padding:3px 8px;border-radius:6px;
  background:#f1f5f9;color:var(--muted);font-weight:500;transition:all .3s;white-space:nowrap}
.wf-step.wf-active{background:#ede9fe;color:#7c3aed;font-weight:700;
  box-shadow:0 0 0 2px rgba(124,58,237,.2)}
.wf-step.wf-done{background:#d1fae5;color:#059669}
.wf-arrow{font-size:.6rem;color:var(--muted)}

/* 操作日志 */
.orch-log{background:#0f172a;border:1px solid #1e293b;border-radius:8px;
  padding:10px 12px;font-size:.7rem;font-family:'Courier New',monospace;
  max-height:130px;overflow-y:auto;line-height:1.9;color:#94a3b8}
.orch-log-line{display:flex;gap:8px;align-items:baseline}
.orch-log-time{color:#475569;font-size:.63rem;white-space:nowrap;flex-shrink:0}

/* 滚动条 */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── 详情抽屉 ── */
.drawer-mask{position:fixed;inset:0;background:rgba(10,15,40,.45);backdrop-filter:blur(4px);
  z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-mask.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;right:0;top:0;bottom:0;width:540px;max-width:96vw;
  background:var(--surface);box-shadow:-8px 0 40px rgba(0,0,0,.18);
  z-index:501;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;flex-shrink:0}
.drawer-avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;overflow:hidden;
  border:2px solid var(--border2)}
.drawer-title{flex:1;min-width:0}
.drawer-name{font-weight:700;font-size:1.05rem;color:var(--text)}
.drawer-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.drawer-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-size:1rem;display:flex;align-items:center;
  justify-content:center;color:var(--muted);transition:.2s;flex-shrink:0}
.drawer-close:hover{background:var(--bg);color:var(--text)}

.drawer-body{flex:1;overflow-y:auto;padding:20px 24px}
.drawer-body::-webkit-scrollbar{width:4px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.d-section{margin-bottom:20px}
.d-section-title{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.d-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.d-task-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;font-size:.82rem;color:var(--text2);line-height:1.7;white-space:pre-wrap}

.d-status-row{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.d-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.d-status-dot.running{background:#818cf8;animation:pulse-dot .8s ease-in-out infinite alternate}
.d-status-dot.done{background:var(--success)}
.d-status-dot.failed{background:var(--danger)}
.d-status-dot.pending{background:var(--muted)}
@keyframes pulse-dot{from{opacity:.5}to{opacity:1;box-shadow:0 0 6px currentColor}}
.d-status-label{font-size:.82rem;font-weight:600;color:var(--text)}
.d-timing{margin-left:auto;font-size:.72rem;color:var(--muted)}

/* Markdown-ish 结果渲染 */
.d-result-box{background:#0f172a;border:1px solid #1e293b;border-radius:10px;
  padding:16px;font-size:.78rem;line-height:1.85;color:#e2e8f0;
  font-family:'Courier New',monospace;white-space:pre-wrap;overflow-x:auto}
.d-result-box.thinking{display:flex;align-items:center;gap:10px;
  background:var(--surface2);border:1px solid var(--border);color:var(--muted)}

/* 实时日志（执行中） */
.d-live-log{background:#0f172a;border:1px solid #1e293b;border-radius:10px;
  padding:12px 14px;max-height:260px;overflow-y:auto;
  font-size:.72rem;font-family:'Courier New',monospace;color:#94a3b8;line-height:1.9}
.d-live-log-line{display:flex;gap:8px}
.d-live-ts{color:#475569;white-space:nowrap;flex-shrink:0}
.d-live-log::-webkit-scrollbar{width:4px}
.d-live-log::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}

/* 卡片 hover 提示 */
.sub-card{cursor:pointer}
.sub-card:hover{border-color:var(--primary);transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(79,110,247,.15)}
.sub-card .view-hint{position:absolute;bottom:8px;right:8px;font-size:.6rem;
  color:var(--muted);opacity:0;transition:.2s}
.sub-card:hover .view-hint{opacity:1}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      <div class="logo-text">AI Team Platform</div>
      <div class="logo-sub">多 Agent 协作编排系统</div>
    </div>
    <span class="badge-pill">OpenClaw</span>
  </div>
  <nav>
    <button class="nav-btn" style="pointer-events:none;opacity:.6">管理台</button>
    <button class="nav-btn scene" onclick="window.open('/scene','_blank')">🎬 3D 指挥中心</button>
  </nav>
</header>

<main>
  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-icon blue">👥</div>
      <div><div class="stat-label">团队成员</div><div class="stat-value" id="s-roles">0</div><div class="stat-sub">已配置角色</div></div>
    </div>
    <div class="stat">
      <div class="stat-icon purple">📋</div>
      <div><div class="stat-label">总任务数</div><div class="stat-value" id="s-tasks">0</div><div class="stat-sub">历史任务</div></div>
    </div>
    <div class="stat">
      <div class="stat-icon green">✅</div>
      <div><div class="stat-label">已完成</div><div class="stat-value" id="s-done">0</div><div class="stat-sub">成功执行</div></div>
    </div>
    <div class="stat">
      <div class="stat-icon amber">👑</div>
      <div><div class="stat-label">主控角色</div><div class="stat-value" id="s-ctrl">—</div><div class="stat-sub" id="s-ctrl-sub">未设置</div></div>
    </div>
  </div>

  <div class="layout">
    <!-- 左列 -->

<script src="/static/vendor/three.min.js"></script>
<script>
// ─── 数据 ───────────────────────────────────────────────────────
let allRoles=[], allTasks=[];
const COLORS=['#4f6ef7','#7c3aed','#10b981','#f59e0b','#ef4444','#06b6d4','#8b5cf6','#ec4899'];
const ICONS=['💼','💻','🎨','📊','🔬','📱','🛡️','🚀','💡','🎯','📝','🔧'];

// ─── Toast ─────────────────────────────────────────────────────
function toast(msg,dur=2600){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

// ─── Three.js 角色渲染（全新卡通风格）──────────────────────────
function renderAvatar(canvas, colorHex, isCtrl){
  const w=80,h=80;
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setSize(w,h); renderer.setPixelRatio(devicePixelRatio);
  renderer.setClearColor(0x000000,0);

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(42,1,.1,20);
  camera.position.set(0,0.3,3.2);

  scene.add(new THREE.AmbientLight(0xffffff,.7));
  const d=new THREE.DirectionalLight(0xffffff,1.2); d.position.set(2,4,3); scene.add(d);
  const pl=new THREE.PointLight(parseInt(colorHex.replace('#',''),16),2,5);
  pl.position.set(0,1,2); scene.add(pl);

  const color=parseInt(colorHex.replace('#',''),16);
  const M=c=>new THREE.MeshPhongMaterial({color:c,shininess:60});
  const skin=M(0xffd4b0), bodyMat=M(color), darkMat=M(0x2d3a6b), whiteMat=M(0xffffff);

  // 身体
  const torso=new THREE.Mesh(new THREE.CylinderGeometry(.32,.28,.52,12),bodyMat);
  torso.position.y=-.05; scene.add(torso);

  // 圆圆肚子高光
  const belly=new THREE.Mesh(new THREE.SphereGeometry(.2,12,12),
    new THREE.MeshPhongMaterial({color,shininess:100,emissive:color,emissiveIntensity:.08}));
  belly.position.set(0,-.02,.28); belly.scale.set(1,.8,1); scene.add(belly);

  // 领口
  const collar=new THREE.Mesh(new THREE.CylinderGeometry(.16,.18,.1,12),whiteMat);
  collar.position.y=.22; scene.add(collar);

  // 头（大圆头卡通风格）
  const head=new THREE.Mesh(new THREE.SphereGeometry(.32,20,16),skin);
  head.position.y=.72; head.scale.set(1,1.05,1); scene.add(head);

  // 脸颊腮红
  [-1,1].forEach(s=>{
    const cheek=new THREE.Mesh(new THREE.SphereGeometry(.1,8,8),
      new THREE.MeshPhongMaterial({color:0xffb3ba,transparent:true,opacity:.5}));
    cheek.position.set(s*.22,.68,.26); cheek.scale.z=.3; scene.add(cheek);
  });

  // 眼睛（大眼萌系）
  [-1,1].forEach(s=>{
    const white=new THREE.Mesh(new THREE.SphereGeometry(.1,12,12),whiteMat);
    white.position.set(s*.12,.75,.28); white.scale.z=.5; scene.add(white);
    const pupil=new THREE.Mesh(new THREE.SphereGeometry(.07,10,10),M(0x1a1f3a));
    pupil.position.set(s*.12,.75,.32); pupil.scale.z=.4; scene.add(pupil);
    const shine=new THREE.Mesh(new THREE.SphereGeometry(.03,6,6),whiteMat);
    shine.position.set(s*.12+.04,.78,.37); scene.add(shine);
  });

  // 嘴巴（弧形微笑）
  const mGeo=new THREE.TorusGeometry(.07,.012,6,12,Math.PI);
  const mouth=new THREE.Mesh(mGeo,M(0xcc5566));
  mouth.position.set(0,.64,.3); mouth.rotation.z=Math.PI; scene.add(mouth);

  // 头发
  const hairColor=isCtrl?0xc8860a:0x2d3a6b;
  const hair=new THREE.Mesh(new THREE.SphereGeometry(.335,16,8,0,Math.PI*2,0,Math.PI*.52),M(hairColor));
  hair.position.y=.82; scene.add(hair);
  // 刘海
  const bang=new THREE.Mesh(new THREE.SphereGeometry(.18,.14,.12,8),M(hairColor));
  bang.position.set(0,.88,.26); scene.add(bang);

  // 耳朵
  [-1,1].forEach(s=>{
    const ear=new THREE.Mesh(new THREE.SphereGeometry(.1,8,8),skin);
    ear.position.set(s*.3,.72,0); ear.scale.z=.5; scene.add(ear);
  });

  // 手臂（小短手）
  const arms=[];
  [-1,1].forEach((s,i)=>{
    const ag=new THREE.Group(); ag.position.set(s*.42,.06,0);
    const upper=new THREE.Mesh(new THREE.CylinderGeometry(.1,.09,.3,8),bodyMat);
    upper.position.y=-.15; ag.add(upper);
    const hand=new THREE.Mesh(new THREE.SphereGeometry(.1,10,10),skin);
    hand.position.y=-.34; ag.add(hand);
    scene.add(ag); arms.push(ag);
  });

  // 腿
  [-1,1].forEach(s=>{
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(.1,.09,.32,8),darkMat);
    leg.position.set(s*.14,-.46,0); scene.add(leg);
    const shoe=new THREE.Mesh(new THREE.BoxGeometry(.16,.1,.22),M(0x1a1f3a));
    shoe.position.set(s*.14,-.65,.04); scene.add(shoe);
  });

  // 主控：金色皇冠
  if(isCtrl){
    const crownMat=new THREE.MeshPhongMaterial({color:0xffd700,shininess:120,emissive:0xffa500,emissiveIntensity:.3});
    const cBase=new THREE.Mesh(new THREE.CylinderGeometry(.28,.22,.1,6),crownMat);
    cBase.position.y=1.09; scene.add(cBase);
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2;
      const sp=new THREE.Mesh(new THREE.ConeGeometry(.06,.2,6),crownMat);
      sp.position.set(Math.cos(a)*.2,1.24,Math.sin(a)*.2); scene.add(sp);
    }
    // 宝石
    const gem=new THREE.Mesh(new THREE.OctahedronGeometry(.05),
      new THREE.MeshPhongMaterial({color:0xff4466,shininess:200,emissive:0xff2244,emissiveIntensity:.5}));
    gem.position.set(0,1.26,0); scene.add(gem);
  }

  // 光环装饰
  const halo=new THREE.Mesh(new THREE.TorusGeometry(.18,.012,6,32),
    new THREE.MeshPhongMaterial({color,emissive:color,emissiveIntensity:.6,transparent:true,opacity:.7}));
  halo.position.y=-.72; halo.rotation.x=Math.PI/2; scene.add(halo);

  // 动画
  let t=Math.random()*Math.PI*2;
  function anim(){
    requestAnimationFrame(anim); t+=.018;
    head.rotation.y=Math.sin(t*.6)*.12;
    head.position.y=.72+Math.sin(t*.8)*.015;
    arms[0].rotation.z=.15+Math.sin(t)*.15;
    arms[1].rotation.z=-.15-Math.sin(t)*.15;
    halo.rotation.z=t*.5; halo.material.opacity=.5+Math.sin(t*.7)*.2;
    if(isCtrl){ belly.material.emissiveIntensity=.06+Math.sin(t*1.2)*.04; }
    renderer.render(scene,camera);
  }
  anim();
}

// ─── 数据加载 ──────────────────────────────────────────────────
async function loadAll(){
  const [rr,tr]=await Promise.all([fetch('/roles'),fetch('/tasks')]);
  allRoles=await rr.json(); allTasks=await tr.json();
  renderStats(); renderRoles(); renderTasks(); renderCtrlPanel();
}

function renderStats(){
  document.getElementById('s-roles').textContent=allRoles.length;
  document.getElementById('s-tasks').textContent=allTasks.length;
  document.getElementById('s-done').textContent=allTasks.filter(t=>t.status==='done').length;
  const ctrl=allRoles.find(r=>r.is_controller);
  document.getElementById('s-ctrl').textContent=ctrl?ctrl.name.slice(0,6):'—';
  document.getElementById('s-ctrl-sub').textContent=ctrl?ctrl.description.slice(0,12)||'主控角色':'未设置';
}

function renderRoles(){
  const grid=document.getElementById('roles-grid');
  const sel=document.getElementById('sel-role');
  sel.innerHTML='<option value="">选择团队成员…</option>';
  if(!allRoles.length){
    grid.innerHTML='<div class="empty-grid"><div class="ei">👥</div><div style="font-weight:600">暂无团队成员</div><div style="font-size:.78rem;margin-top:4px">点击右侧新增角色</div></div>';
    return;
  }
  grid.innerHTML=allRoles.map((r,i)=>{
    const ic=r.is_controller;
    const icon=ic?'👑':ICONS[i%ICONS.length];
    const opt=document.createElement('option'); opt.value=r.id;
    opt.textContent=`${icon} ${r.name}`; sel.appendChild(opt);
    return `<div class="role-card${ic?' is-ctrl':''}" id="rc-${r.id}" onclick="pickRole('${r.id}')">
      ${ic?'<div class="ctrl-badge">👑 主控</div>':''}
      <div class="avatar-ring">
        <canvas id="av-${r.id}" width="80" height="80"></canvas>
        <div class="online-dot"></div>
      </div>
      <div class="role-name">${icon} ${r.name}</div>
      <div class="role-tag">agent: ${r.agent_id}</div>
      <div style="margin-bottom:6px">
        ${r.session_key
          ? `<span style="font-size:.64rem;background:#d1fae5;color:#059669;padding:2px 7px;border-radius:999px;font-weight:600">⚡ 持久Session</span>`
          : `<span style="font-size:.64rem;background:#f1f5f9;color:var(--muted);padding:2px 7px;border-radius:999px;font-weight:500" title="点击刷新">○ 初始化中…</span>`
        }
      </div>
      <div class="role-desc">${r.description||'暂无描述'}</div>
      <div class="role-actions">
        ${ic
          ?`<button class="btn-xs btn-cmd" onclick="event.stopPropagation();focusOrch()">⚡ 下令</button>`
          :`<button class="btn-xs btn-assign" onclick="event.stopPropagation();pickRole('${r.id}')">📋 分配</button>`}
        <button class="btn-xs btn-del" onclick="event.stopPropagation();delRole('${r.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
  allRoles.forEach((r,i)=>{
    const cvs=document.getElementById(`av-${r.id}`);
    if(cvs) renderAvatar(cvs, r.is_controller?'#f59e0b':COLORS[i%COLORS.length], r.is_controller);
  });
}

function renderCtrlPanel(){
  const ctrl=allRoles.find(r=>r.is_controller);
  document.getElementById('no-ctrl').style.display=ctrl?'none':'block';
  document.getElementById('ctrl-form').style.display=ctrl?'block':'none';
  if(ctrl){
    document.getElementById('ctrl-n').textContent=ctrl.name;
    document.getElementById('ctrl-d').textContent=ctrl.description||'主控角色';
  }
}

function renderTasks(){
  const feed=document.getElementById('task-feed');
  if(!allTasks.length){feed.innerHTML='<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:16px">暂无任务</div>';return;}
  feed.innerHTML=allTasks.slice(0,10).map(t=>{
    const r=allRoles.find(r=>r.id===t.role_id);
    const sc=t.status==='done'?'sp-done':t.status==='failed'?'sp-failed':'sp-running';
    const icon=t.is_orchestrated?'👑':'';
    const time=new Date(t.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    // 编排任务：显示子角色结果按钮
    const subBtns=t.is_orchestrated && t.sub_tasks?.length
      ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px">
          ${t.sub_tasks.map(st=>`
            <button class="btn-xs ${st.status==='done'?'btn-assign':st.status==='failed'?'btn-del':'btn-cmd'}"
              style="font-size:.65rem;padding:3px 8px"
              onclick="event.stopPropagation();viewSubResult('${t.id}','${st.role_id}','${st.role_name}')">
              ${getRoleIcon(st.role_name)} ${st.role_name}
              <span style="opacity:.7">${st.status==='done'?'✓':st.status==='failed'?'✗':'…'}</span>
            </button>`).join('')}
        </div>` : '';
    return `<div class="task-item" style="flex-direction:column;align-items:stretch;gap:6px;cursor:default">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="task-item-left">
          <div class="task-role">${icon}${r?.name||'未知'} <span style="font-weight:400;color:var(--muted);font-size:.68rem">${t.is_orchestrated?'主控编排':''}</span></div>
          <div class="task-msg">${t.message}</div>
        </div>
        <div class="task-time">${time}</div>
        <div class="status-pill ${sc}">${t.status==='done'?'完成':t.status==='running'?'执行中':'失败'}</div>
      </div>
      ${subBtns}
    </div>`;
  }).join('');
}

// 从历史任务查看某角色结果（打开抽屉）
async function viewSubResult(taskId, roleId, roleName) {
  // 确保 allTasks 中有这条任务的完整数据
  let task = allTasks.find(t => t.id === taskId);
  if (!task || !task.sub_tasks?.length) {
    try {
      const r = await fetch(`/tasks/${taskId}`);
      if (r.ok) {
        task = await r.json();
        const idx = allTasks.findIndex(t => t.id === taskId);
        if (idx >= 0) allTasks[idx] = task; else allTasks.unshift(task);
      }
    } catch(e) {}
  }
  currentOrchTaskId = taskId;
  openDrawer(roleId, taskId);
}

// ─── 交互 ──────────────────────────────────────────────────────
function pickRole(id){
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById(`rc-${id}`)?.classList.add('selected');
  document.getElementById('sel-role').value=id;
  document.getElementById('sel-msg').focus();
}
function focusOrch(){document.getElementById('orch-msg').focus();}

async function addRole(){
  const name=document.getElementById('n-name').value.trim();
  const agentId=document.getElementById('n-agent').value.trim()||'main';
  const desc=document.getElementById('n-desc').value.trim();
  const prompt=document.getElementById('n-prompt').value.trim();
  const isCtrl=document.getElementById('n-ctrl').checked;
  if(!name){toast('⚠️ 请填写角色名称');return;}
  await fetch('/roles',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,agent_id:agentId,description:desc,system_prompt:prompt,is_controller:isCtrl})});
  ['n-name','n-desc','n-prompt'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('n-ctrl').checked=false;
  document.getElementById('tt').classList.remove('on');
  toast(isCtrl?`👑 主控「${name}」就位！`:`✅「${name}」已加入团队`);
  await loadAll();
}

async function delRole(id){
  const r=allRoles.find(r=>r.id===id);
  if(!confirm(`确认删除「${r?.name}」？`))return;
  await fetch(`/roles/${id}`,{method:'DELETE'});
  toast('🗑 角色已移除'); await loadAll();
}

// ─── 抽屉状态 ─────────────────────────────────────────────────
let drawerRoleId = null;
let drawerTaskId = null;
let drawerRefreshTimer = null;
let drawerAvatarRenderer = null;  // 保存 Three.js renderer 引用

function openDrawer(roleId, taskId) {
  drawerRoleId = roleId;
  drawerTaskId = taskId;
  document.getElementById('drawer-mask').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  refreshDrawer();
  // 执行中时自动轮询
  clearInterval(drawerRefreshTimer);
  drawerRefreshTimer = setInterval(() => {
    if (drawerRoleId && drawerTaskId) refreshDrawer();
  }, 2000);
}

function closeDrawer() {
  document.getElementById('drawer-mask').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  clearInterval(drawerRefreshTimer);
  drawerRoleId = null;
  drawerTaskId = null;
}

async function refreshDrawer() {
  if (!drawerRoleId || !drawerTaskId) return;

  // 始终从后端拉最新数据，确保结果完整（尤其 done 状态有完整 result）
  let st = null;
  try {
    const r = await fetch(`/tasks/${drawerTaskId}/sub/${drawerRoleId}`);
    if (r.ok) st = await r.json();
  } catch(e) {}

  // 后端没有时 fallback 到内存
  if (!st) {
    const taskEl = allTasks.find(t => t.id === drawerTaskId);
    if (taskEl?.sub_tasks) st = taskEl.sub_tasks.find(s => s.role_id === drawerRoleId);
  }

  if (!st) return;
  const role = allRoles.find(r => r.id === drawerRoleId);
  const roleIdx = allRoles.findIndex(r => r.id === drawerRoleId);

  // 头部信息
  document.getElementById('drawer-name').textContent = `${getRoleIcon(st.role_name)} ${st.role_name}`;
  document.getElementById('drawer-meta').textContent = role ? (role.description || `agent: ${role.agent_id}`) : '子角色';

  // 头像（只渲染一次）
  const cvs = document.getElementById('drawer-av');
  if (cvs && !cvs._rendered) {
    cvs._rendered = true;
    renderAvatar(cvs, role?.is_controller ? '#f59e0b' : COLORS[roleIdx >= 0 ? roleIdx % COLORS.length : 0], role?.is_controller || false);
  }

  // 状态
  const dot = document.getElementById('drawer-dot');
  const label = document.getElementById('drawer-status-label');
  const timing = document.getElementById('drawer-timing');
  dot.className = `d-status-dot ${st.status}`;
  label.textContent = { pending: '⏳ 等待中', running: '⚡ 执行中', done: '✅ 已完成', failed: '❌ 失败' }[st.status] || st.status;

  // 耗时
  if (st.started_at && st.finished_at) {
    const s = new Date(st.started_at), e = new Date(st.finished_at);
    const sec = Math.round((e - s) / 1000);
    timing.textContent = sec < 60 ? `耗时 ${sec}s` : `耗时 ${Math.floor(sec/60)}m ${sec%60}s`;
  } else if (st.started_at && st.status === 'running') {
    const sec = Math.round((Date.now() - new Date(st.started_at)) / 1000);
    timing.textContent = `已运行 ${sec}s`;
  } else {
    timing.textContent = '';
  }

  // 任务内容
  document.getElementById('drawer-task').textContent = st.sub_task || '（未分配）';

  // 实时日志区（执行中）
  const logSec = document.getElementById('drawer-log-section');
  const liveLog = document.getElementById('drawer-live-log');
  if (st.status === 'running') {
    logSec.style.display = 'block';
    // 追加日志行（避免重复）
    const ts = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const line = document.createElement('div');
    line.className = 'd-live-log-line';
    line.innerHTML = `<span class="d-live-ts">${ts}</span><span style="color:#a5b4fc">⚡ 正在执行...</span>`;
    liveLog.appendChild(line);
    liveLog.scrollTop = liveLog.scrollHeight;
  } else {
    // 结束后保留日志，加一条结束行
    if (logSec.style.display !== 'none') {
      const ts = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const endLine = document.createElement('div');
      endLine.className = 'd-live-log-line';
      endLine.innerHTML = `<span class="d-live-ts">${ts}</span><span style="color:${st.status==='done'?'#6ee7b7':'#fca5a5'}">${st.status==='done'?'✅ 执行完成':'❌ 执行失败'}</span>`;
      liveLog.appendChild(endLine);
      liveLog.scrollTop = liveLog.scrollHeight;
    }
    // 停止轮询
    clearInterval(drawerRefreshTimer);
  }

  // 结果区
  const resBox = document.getElementById('drawer-result');
  if (st.status === 'pending') {
    resBox.className = 'd-result-box thinking';
    resBox.innerHTML = `<div class="sc-thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div><span style="font-family:Inter,sans-serif;font-size:.78rem;color:var(--muted)">等待执行…</span>`;
  } else if (st.status === 'running') {
    resBox.className = 'd-result-box thinking';
    resBox.innerHTML = `<div class="sc-thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div><span style="font-family:Inter,sans-serif;font-size:.78rem;color:var(--muted)">正在生成结果，请稍候…</span>`;
  } else if (st.result) {
    resBox.className = 'd-result-box';
    resBox.innerHTML = renderMarkdownLite(st.result);
  } else {
    resBox.className = 'd-result-box thinking';
    resBox.innerHTML = `<span style="font-family:Inter,sans-serif;color:var(--muted)">${st.status==='failed'?'❌ 执行失败，无结果':'（无内容）'}</span>`;
  }
}

// 轻量 Markdown 渲染（标题/加粗/代码块/列表）
function renderMarkdownLite(text) {
  if (!text) return '';
  // 转义 HTML
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 代码块
  s = s.replace(/```[\w]*\n?([\s\S]*?)```/g, '<div style="background:#1e293b;border-radius:6px;padding:10px 12px;margin:8px 0;color:#e2e8f0;font-size:.75rem;overflow-x:auto">$1</div>');
  // 内联代码
  s = s.replace(/`([^`]+)`/g, '<code style="background:#1e293b;color:#a5b4fc;padding:1px 5px;border-radius:4px;font-size:.85em">$1</code>');
  // 标题
  s = s.replace(/^### (.+)$/gm, '<div style="font-weight:700;color:#a5b4fc;margin:12px 0 4px;font-size:.85rem">$1</div>');
  s = s.replace(/^## (.+)$/gm, '<div style="font-weight:700;color:#c4b5fd;margin:14px 0 4px;font-size:.9rem;border-bottom:1px solid #1e293b;padding-bottom:4px">$1</div>');
  s = s.replace(/^# (.+)$/gm, '<div style="font-weight:700;color:#e2e8f0;margin:16px 0 6px;font-size:1rem">$1</div>');
  // 加粗
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#f1f5f9">$1</strong>');
  // 列表
  s = s.replace(/^[-*] (.+)$/gm, '<div style="padding-left:12px;margin:2px 0">· $1</div>');
  // 换行
  s = s.replace(/\n/g, '<br>');
  return s;
}
let currentOrchTaskId=null;

function startOrchSSE(taskId){
  if(orchSSE){orchSSE.close();}
  orchSSE=new EventSource('/events');
  orchSSE.onmessage=e=>{
    try{
      const raw=JSON.parse(e.data);
      // 兼容两种格式：{event, data} 或扁平格式
      const evName=raw.event||raw.type||'';
      const d=raw.data||raw;
      if(evName==='ping'||evName==='connected')return;
      if(evName==='orchestration_start'){
        renderSubPanel([], d.target_roles||[]);
        updateOrchLog(`👑 主控开始编排，目标成员：${(d.target_roles||[]).join('、')}`);
      } else if(evName==='orchestration_step'){
        const stepMap={analyzing:'🧠 分析任务',planned:'⚡ 拆解完成',dispatching:'📤 下发各角色',summarizing:'📊 汇总中…'};
        updateOrchLog(stepMap[d.step]||d.step);
        updateWfStep(d.step);
      } else if(evName==='sub_task_update'){
        updateSubCard(d);
        if(drawerRoleId===d.role_id)refreshDrawer();
      } else if(evName==='orchestration_done'){
        updateOrchLog('🎉 所有角色已完成，主控正在汇总报告…');
        if(orchSSE){orchSSE.close();orchSSE=null;}
      }
    }catch(err){}
  };
  orchSSE.onerror=()=>{if(orchSSE){orchSSE.close();orchSSE=null;}};
}

function renderSubPanel(subTasks, roleNames){
  const panel=document.getElementById('sub-exec-panel');
  panel.style.display='block';
  const grid=document.getElementById('sub-cards');
  const items=subTasks.length?subTasks:roleNames.map(n=>({role_name:n,status:'pending',sub_task:'',result:''}));
  grid.innerHTML=items.map(st=>{
    const key=(st.role_id||st.role_name).replace(/[^a-z0-9]/gi,'_');
    const clickable=st.role_id?`onclick="openDrawer('${st.role_id}','${currentOrchTaskId||''}')"`:'';
    return `<div class="sub-card" id="sc-${key}" ${clickable} title="点击查看执行详情">
      <div class="sc-header">
        <span class="sc-name">${getRoleIcon(st.role_name)} ${st.role_name}</span>
        <span class="sc-badge sc-${st.status||'pending'}">${statusLabel(st.status||'pending')}</span>
      </div>
      <div class="sc-task">${st.sub_task||'等待分配…'}</div>
      <div class="sc-result" id="scr-${key}">${
        st.result?`<div class="sc-result-text">${st.result.slice(0,200)}${st.result.length>200?'…':''}</div>`:
        '<div class="sc-thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>'
      }</div>
      <div class="view-hint">🔍 查看详情</div>
    </div>`;
  }).join('');
}

function updateSubCard(data){
  const key=(data.role_id||data.role_name||'').replace(/[^a-z0-9]/gi,'_');
  let card=document.getElementById(`sc-${key}`);
  if(!card){
    const grid=document.getElementById('sub-cards');
    card=document.createElement('div');
    card.className='sub-card'; card.id=`sc-${key}`;
    if(data.role_id){
      card.setAttribute('onclick',`openDrawer('${data.role_id}','${currentOrchTaskId||''}')`);
      card.title='点击查看执行详情';
    }
    card.innerHTML=`
      <div class="sc-header">
        <span class="sc-name">${getRoleIcon(data.role_name)} ${data.role_name}</span>
        <span class="sc-badge sc-${data.status}">${statusLabel(data.status)}</span>
      </div>
      <div class="sc-task">${data.sub_task||''}</div>
      <div class="sc-result" id="scr-${key}">
        <div class="sc-thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      </div>
      <div class="view-hint">🔍 查看详情</div>`;
    grid.appendChild(card);
    return;
  }
  // 补充 onclick（若之前不知道 role_id）
  if(data.role_id && !card.getAttribute('onclick')){
    card.setAttribute('onclick',`openDrawer('${data.role_id}','${currentOrchTaskId||''}')`);
    card.title='点击查看执行详情';
  }
  const badge=card.querySelector('.sc-badge');
  if(badge){badge.className=`sc-badge sc-${data.status}`;badge.textContent=statusLabel(data.status);}
  if(data.sub_task){const t=card.querySelector('.sc-task');if(t)t.textContent=data.sub_task;}
  const res=document.getElementById(`scr-${key}`);
  if(res){
    if(data.status==='running'){
      res.innerHTML='<div class="sc-thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    } else if(data.result){
      res.innerHTML=`<div class="sc-result-text">${data.result.slice(0,300)}${data.result.length>300?'…':''}</div>`;
    } else if(data.status==='done'){
      res.innerHTML='<div class="sc-result-text" style="color:var(--success)">✅ 已完成，等待汇总</div>';
    }
  }
  if(data.status==='running'){card.classList.add('sc-active');card.classList.remove('sc-fin');}
  else if(data.status==='done'){card.classList.remove('sc-active');card.classList.add('sc-fin');}
}

function updateOrchLog(msg){
  const log=document.getElementById('orch-log');
  if(!log)return;
  const line=document.createElement('div');
  line.className='orch-log-line';
  line.innerHTML=`<span class="orch-log-time">${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>${msg}`;
  log.appendChild(line);
  log.scrollTop=log.scrollHeight;
}

function updateWfStep(step){
  const steps=['analyzing','planned','dispatching','summarizing','done'];
  const labels=['分析','拆解','下发','执行','汇总'];
  const container=document.getElementById('wf-steps-inline');
  if(!container)return;
  const idx=steps.indexOf(step);
  container.querySelectorAll('.wf-step').forEach((el,i)=>{
    el.classList.toggle('wf-done',i<idx);
    el.classList.toggle('wf-active',i===idx);
  });
}

function getRoleIcon(name){
  if(!name)return '🤖';
  if(/产品|PM|product/i.test(name))return '📋';
  if(/架构|architect/i.test(name))return '🏗️';
  if(/后端|backend/i.test(name))return '⚙️';
  if(/前端|frontend/i.test(name))return '🎨';
  if(/测试|QA/i.test(name))return '🧪';
  if(/运维|devops/i.test(name))return '🚀';
  if(/主控|controller/i.test(name))return '👑';
  if(/设计|design/i.test(name))return '✏️';
  if(/运营/i.test(name))return '📊';
  return '🤖';
}

function statusLabel(s){
  return {pending:'等待中',running:'执行中',done:'✅ 完成',failed:'❌ 失败'}[s]||s;
}

async function runOrch(){
  const ctrl=allRoles.find(r=>r.is_controller);
  if(!ctrl){toast('⚠️ 无主控角色');return;}
  const msg=document.getElementById('orch-msg').value.trim();
  if(!msg){toast('⚠️ 请输入任务');return;}
  const btn=document.getElementById('orch-btn');
  const rb=document.getElementById('orch-result');

  btn.disabled=true; btn.textContent='⏳ 编排中…';
  rb.style.display='block';
  rb.innerHTML='';
  currentOrchTaskId=null;

  // 初始化面板
  document.getElementById('sub-exec-panel').style.display='block';
  document.getElementById('sub-cards').innerHTML='<div style="color:var(--muted);font-size:.82rem">⏳ 等待主控分配任务…</div>';
  const logEl=document.getElementById('orch-log');
  if(logEl)logEl.innerHTML='';

  // 初始化工作流步骤
  const wfEl=document.getElementById('wf-steps-inline');
  if(wfEl)wfEl.querySelectorAll('.wf-step').forEach(el=>{el.classList.remove('wf-done','wf-active');});

  // 先订阅 SSE，再发请求
  startOrchSSE(null);
  updateOrchLog('🚀 开始编排任务：'+msg);

  try{
    let res;
    try{
      res=await fetch('/orchestrate',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({controller_id:ctrl.id,message:msg})});
    }catch(netErr){
      throw new Error('网络连接失败，请确认服务已启动（端口 8765）');
    }
    if(!res.ok){
      let errMsg=`HTTP ${res.status}`;
      try{ const j=await res.json(); errMsg=j.detail||JSON.stringify(j); }catch(_){}
      throw new Error(errMsg);
    }
    const task=await res.json();
    currentOrchTaskId=task.id;

    // 同步到 allTasks 以便抽屉使用
    const existing=allTasks.findIndex(t=>t.id===task.id);
    if(existing>=0)allTasks[existing]=task; else allTasks.unshift(task);

    // 用返回的 sub_tasks 刷新卡片（最终状态，含完整 role_id）
    // 同时修复 SSE 阶段绑定时 taskId 为空的问题
    if(task.sub_tasks?.length){
      renderSubPanel(task.sub_tasks,[]);
      // 确保所有卡片都绑定了正确的 taskId
      task.sub_tasks.forEach(st=>{
        const key=st.role_id.replace(/[^a-z0-9]/gi,'_');
        const card=document.getElementById(`sc-${key}`);
        if(card) card.setAttribute('onclick',`openDrawer('${st.role_id}','${task.id}')`);
      });
    }
    rb.innerHTML=`
      <div style="color:var(--success);font-weight:700;margin-bottom:10px;font-size:1rem">🎉 编排完成！</div>
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:8px">👆 点击上方各角色卡片可查看完整执行结果</div>
      <div style="white-space:pre-wrap;font-size:.82rem;line-height:1.7;color:var(--text2)">${task.result||'（无汇总内容）'}</div>`;
    updateOrchLog('🎉 编排完成，主控已汇总结果');
    toast('🎉 编排任务完成！点击角色卡片查看详情');
    await loadAll();
  }catch(e){
    rb.innerHTML=`<div style="color:var(--danger)">❌ ${e.message}</div>`;
    updateOrchLog('❌ 编排失败：'+e.message);
  }
  btn.disabled=false; btn.textContent='⚡ 下达指令并编排';
}

async function sendTask(){
  const roleId=document.getElementById('sel-role').value;
  const msg=document.getElementById('sel-msg').value.trim();
  if(!roleId){toast('⚠️ 请选择角色');return;}
  if(!msg){toast('⚠️ 请输入任务');return;}
  const btn=document.getElementById('task-btn');
  const rb=document.getElementById('task-result');
  btn.disabled=true; btn.textContent='⏳ 执行中…';
  rb.style.display='block'; rb.textContent='正在处理…';
  try{
    const res=await fetch(`/roles/${roleId}/tasks`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const task=await res.json();
    rb.innerHTML=`<div class="status-pill ${task.status==='done'?'sp-done':'sp-failed'}" style="margin-bottom:8px;display:inline-flex">${task.status==='done'?'完成':'失败'}</div>\n${task.result||''}`;
    toast(task.status==='done'?'✅ 任务完成':'❌ 任务失败'); await loadAll();
  }catch(e){rb.textContent=`❌ ${e.message}`;}
  btn.disabled=false; btn.textContent='🚀 分配任务';
}

// Toggle 交互
document.getElementById('n-ctrl').addEventListener('change',function(){
  document.getElementById('tt').classList.toggle('on',this.checked);
});

loadAll();
</script>
