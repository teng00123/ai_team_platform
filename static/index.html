<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Team Platform</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;--surface:#fff;--surface2:#f8faff;
  --border:#e2e8f8;--border2:#c8d5f5;
  --primary:#4f6ef7;--primary2:#7c3aed;
  --gold:#f59e0b;--gold2:#fbbf24;
  --success:#10b981;--danger:#ef4444;--warn:#f59e0b;
  --text:#1a1f3a;--text2:#4a5578;--muted:#8896b3;
  --shadow:0 2px 16px rgba(79,110,247,.1);
  --shadow2:0 8px 32px rgba(79,110,247,.18);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* 背景装饰 */
body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;
  background:radial-gradient(circle,rgba(79,110,247,.12),transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-150px;left:-150px;width:400px;height:400px;
  background:radial-gradient(circle,rgba(124,58,237,.08),transparent 70%);pointer-events:none;z-index:0}

/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:0 32px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 12px rgba(79,110,247,.08)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  box-shadow:0 4px 12px rgba(79,110,247,.3)}
.logo-text{font-family:'Sora',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text)}
.logo-sub{font-size:.7rem;color:var(--muted);font-weight:400}
.badge-pill{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;
  font-size:.65rem;padding:3px 10px;border-radius:999px;font-weight:600;letter-spacing:.04em}
nav{display:flex;gap:8px;align-items:center}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--text2);
  padding:7px 16px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:500;
  transition:all .2s;font-family:inherit}
.nav-btn:hover{border-color:var(--primary);color:var(--primary);background:rgba(79,110,247,.05)}
.nav-btn.scene{background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(79,110,247,.3)}
.nav-btn.scene:hover{opacity:.88}

/* Main */
main{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:28px 24px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:20px 22px;display:flex;align-items:center;gap:16px;
  box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow2)}
.stat-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:1.4rem;flex-shrink:0}
.stat-icon.blue{background:linear-gradient(135deg,#eff3ff,#dde6ff)}
.stat-icon.purple{background:linear-gradient(135deg,#f3f0ff,#e5d8ff)}
.stat-icon.green{background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.stat-icon.amber{background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.stat-label{font-size:.72rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.stat-value{font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:700;color:var(--text);line-height:1.1}
.stat-sub{font-size:.72rem;color:var(--muted)}

/* Layout */
.layout{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}

/* Section title */
.sec-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* 角色卡片 */
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:16px}
.role-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;
  padding:20px 16px 16px;text-align:center;cursor:pointer;position:relative;
  transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.role-card:hover{border-color:var(--primary);transform:translateY(-4px);
  box-shadow:0 12px 32px rgba(79,110,247,.15)}
.role-card.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.15)}
.role-card.is-ctrl{border-color:var(--gold);background:linear-gradient(145deg,#fffdf0,#fff8e1);}
.role-card.is-ctrl:hover{border-color:var(--gold2);box-shadow:0 12px 32px rgba(245,158,11,.2)}

/* 主控标签 */
.ctrl-badge{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#fff;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:999px;
  box-shadow:0 2px 8px rgba(245,158,11,.4);letter-spacing:.04em}

/* 头像圆 */
.avatar-ring{width:80px;height:80px;margin:0 auto 12px;position:relative}
.avatar-ring canvas{width:80px;height:80px;border-radius:50%}
.avatar-ring::after{content:'';position:absolute;inset:-3px;border-radius:50%;
  border:2px solid transparent;background:linear-gradient(135deg,var(--primary),var(--primary2)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude}
.role-card.is-ctrl .avatar-ring::after{background:linear-gradient(135deg,var(--gold),var(--gold2)) border-box}
.online-dot{position:absolute;bottom:4px;right:4px;width:12px;height:12px;
  border-radius:50%;background:var(--success);border:2px solid #fff;z-index:2}

.role-name{font-weight:700;font-size:.95rem;color:var(--text);margin-bottom:4px}
.role-tag{display:inline-block;background:rgba(79,110,247,.08);color:var(--primary);
  font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:999px;margin-bottom:8px}
.role-card.is-ctrl .role-tag{background:rgba(245,158,11,.12);color:var(--gold)}
.role-desc{font-size:.75rem;color:var(--muted);line-height:1.5;min-height:2.2em;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.role-actions{display:flex;gap:6px;margin-top:12px;justify-content:center}
.btn-xs{padding:5px 12px;border-radius:8px;font-size:.72rem;font-weight:600;
  border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-assign{background:rgba(79,110,247,.1);color:var(--primary)}
.btn-assign:hover{background:rgba(79,110,247,.2)}
.btn-cmd{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(251,191,36,.1));color:var(--gold)}
.btn-cmd:hover{background:rgba(245,158,11,.25)}
.btn-del{background:rgba(239,68,68,.08);color:var(--danger)}
.btn-del:hover{background:rgba(239,68,68,.16)}

.empty-grid{text-align:center;padding:52px 20px;color:var(--muted);grid-column:1/-1}
.empty-grid .ei{font-size:3rem;margin-bottom:10px;opacity:.35}

/* 最近任务 */
.task-feed{display:flex;flex-direction:column;gap:8px;margin-top:24px;max-height:280px;overflow-y:auto}
.task-feed::-webkit-scrollbar{width:4px}
.task-feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;display:flex;align-items:center;gap:12px}
.task-item-left{flex:1;min-width:0}
.task-role{font-size:.78rem;font-weight:600;color:var(--primary)}
.task-msg{font-size:.78rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.task-time{font-size:.68rem;color:var(--muted);flex-shrink:0}
.status-pill{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:999px;flex-shrink:0}
.sp-done{background:#ecfdf5;color:#059669}
.sp-running{background:#eff6ff;color:#2563eb}
.sp-failed{background:#fef2f2;color:#dc2626}

/* Panel */
.panel{display:flex;flex-direction:column;gap:16px}
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:22px;box-shadow:var(--shadow)}

/* Form */
.form-label{font-size:.72rem;font-weight:600;color:var(--text2);letter-spacing:.04em;
  text-transform:uppercase;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);
  color:var(--text);border-radius:10px;padding:10px 14px;font-size:.875rem;
  outline:none;transition:border .2s,box-shadow .2s;font-family:inherit;margin-bottom:12px}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.1)}
textarea.form-input{resize:vertical;min-height:72px}

/* 主控 toggle */
.toggle-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;
  background:linear-gradient(135deg,#fffbeb,#fff8e1);border:1.5px solid #fde68a;
  border-radius:12px;padding:10px 14px}
.toggle-switch{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:#e2e8f8;border-radius:999px;
  cursor:pointer;transition:.3s}
.toggle-track.on{background:linear-gradient(135deg,var(--gold),var(--gold2))}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;
  background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle-track.on .toggle-thumb{left:21px}

/* 主控区块 */
.ctrl-block{background:linear-gradient(135deg,#fffdf0,#fff8e1);border:1.5px solid #fde68a;border-radius:16px;padding:14px 16px;margin-bottom:12px}
.ctrl-who{display:flex;align-items:center;gap:10px}
.ctrl-crown{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.ctrl-name{font-weight:700;font-size:.92rem;color:var(--text)}
.ctrl-role{font-size:.72rem;color:var(--gold)}

.btn-primary{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:#fff;border:none;padding:12px;border-radius:12px;font-weight:700;
  font-size:.88rem;cursor:pointer;font-family:inherit;transition:.2s;
  box-shadow:0 4px 14px rgba(79,110,247,.3);letter-spacing:.02em}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));
  box-shadow:0 4px 14px rgba(245,158,11,.3)}

/* 结果框 */
.result-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;
  padding:14px;font-size:.8rem;color:var(--text2);white-space:pre-wrap;
  max-height:200px;overflow-y:auto;display:none;margin-top:10px;line-height:1.7}
.result-box::-webkit-scrollbar{width:4px}
.result-box::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:#fff;padding:10px 20px;border-radius:12px;
  font-size:.83rem;font-weight:500;z-index:999;opacity:0;transition:.3s;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.2);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 滚动条 */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      <div class="logo-text">AI Team Platform</div>
      <div class="logo-sub">多 Agent 协作编排系统</div>
    </div>
    <span class="badge-pill">OpenClaw</span>
  </div>
  <nav>
    <button class="nav-btn" style="pointer-events:none;opacity:.6">管理台</button>
    <button class="nav-btn scene" onclick="window.open('/scene','_blank')">🎬 3D 指挥中心</button>
  </nav>
</header>

<main>
  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-icon blue">👥</div>
      <div><div class="stat-label">团队成员</div><div class="stat-value" id="s-roles">0</div><div class="stat-sub">已配置角色</div></div>
    </div>
    <div class="stat">
      <div class="stat-icon purple">📋</div>
      <div><div class="stat-label">总任务数</div><div class="stat-value" id="s-tasks">0</div><div class="stat-sub">历史任务</div></div>
    </div>
    <div class="stat">
      <div class="stat-icon green">✅</div>
      <div><div class="stat-label">已完成</div><div class="stat-value" id="s-done">0</div><div class="stat-sub">成功执行</div></div>
    </div>
    <div class="stat">
      <div class="stat-icon amber">👑</div>
      <div><div class="stat-label">主控角色</div><div class="stat-value" id="s-ctrl">—</div><div class="stat-sub" id="s-ctrl-sub">未设置</div></div>
    </div>
  </div>

  <div class="layout">
    <!-- 左列 -->
    <div>
      <div class="sec-title">团队成员</div>
      <div class="roles-grid" id="roles-grid">
        <div class="empty-grid"><div class="ei">👥</div><div>暂无角色，点击右侧新增</div></div>
      </div>
      <div class="sec-title" style="margin-top:28px">最近任务</div>
      <div class="task-feed" id="task-feed">
        <div style="color:var(--muted);font-size:.82rem;text-align:center;padding:16px">暂无任务</div>
      </div>
    </div>

    <!-- 右列 -->
    <div class="panel">

      <!-- 新增角色 -->
      <div class="panel-card">
        <div class="sec-title" style="margin-bottom:18px">新增角色</div>
        <label class="form-label">角色名称</label>
        <input class="form-input" id="n-name" placeholder="如：产品经理、研发工程师…"/>
        <label class="form-label">Agent ID</label>
        <input class="form-input" id="n-agent" value="main"/>
        <label class="form-label">角色描述</label>
        <input class="form-input" id="n-desc" placeholder="简短描述职责范围"/>
        <label class="form-label">系统提示词 <span style="color:var(--muted);font-weight:400;text-transform:none">（可选）</span></label>
        <textarea class="form-input" id="n-prompt" placeholder="定义该角色的行为与专长…"></textarea>
        <!-- 主控开关 -->
        <div class="toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" id="n-ctrl">
            <div class="toggle-track" id="tt"><div class="toggle-thumb" id="tk"></div></div>
          </label>
          <div>
            <div style="font-size:.84rem;font-weight:600;color:#92400e">👑 设为主控角色</div>
            <div style="font-size:.7rem;color:#b45309">主控负责拆解任务并指挥团队</div>
          </div>
        </div>
        <button class="btn-primary" onclick="addRole()">+ 新增角色</button>
      </div>

      <!-- 主控编排 -->
      <div class="panel-card" id="orch-card" style="border-color:#fde68a">
        <div class="sec-title" style="margin-bottom:14px;color:var(--gold)">👑 主控编排</div>
        <div id="no-ctrl" style="color:var(--muted);font-size:.82rem;text-align:center;padding:8px">
          请先新增角色并勾选「主控」
        </div>
        <div id="ctrl-form" style="display:none">
          <div class="ctrl-block">
            <div class="ctrl-who">
              <div class="ctrl-crown">👑</div>
              <div>
                <div class="ctrl-name" id="ctrl-n">—</div>
                <div class="ctrl-role" id="ctrl-d">主控角色</div>
              </div>
            </div>
          </div>
          <label class="form-label">下达总任务</label>
          <textarea class="form-input" id="orch-msg" rows="3" placeholder="例：设计一款 AI 助手产品…"></textarea>
          <button class="btn-primary btn-gold" id="orch-btn" onclick="runOrch()">⚡ 下达指令并编排</button>
          <div class="result-box" id="orch-result"></div>
        </div>
      </div>

      <!-- 直接分配 -->
      <div class="panel-card">
        <div class="sec-title" style="margin-bottom:18px">直接分配任务</div>
        <label class="form-label">选择角色</label>
        <select class="form-input" id="sel-role" style="margin-bottom:12px">
          <option value="">选择团队成员…</option>
        </select>
        <label class="form-label">任务内容</label>
        <textarea class="form-input" id="sel-msg" rows="3" placeholder="描述任务…"></textarea>
        <button class="btn-primary" id="task-btn" onclick="sendTask()">🚀 分配任务</button>
        <div class="result-box" id="task-result"></div>
      </div>

    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ─── 数据 ───────────────────────────────────────────────────────
let allRoles=[], allTasks=[];
const COLORS=['#4f6ef7','#7c3aed','#10b981','#f59e0b','#ef4444','#06b6d4','#8b5cf6','#ec4899'];
const ICONS=['💼','💻','🎨','📊','🔬','📱','🛡️','🚀','💡','🎯','📝','🔧'];

// ─── Toast ─────────────────────────────────────────────────────
function toast(msg,dur=2600){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

// ─── Three.js 角色渲染（全新卡通风格）──────────────────────────
function renderAvatar(canvas, colorHex, isCtrl){
  const w=80,h=80;
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setSize(w,h); renderer.setPixelRatio(devicePixelRatio);
  renderer.setClearColor(0x000000,0);

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(42,1,.1,20);
  camera.position.set(0,0.3,3.2);

  scene.add(new THREE.AmbientLight(0xffffff,.7));
  const d=new THREE.DirectionalLight(0xffffff,1.2); d.position.set(2,4,3); scene.add(d);
  const pl=new THREE.PointLight(parseInt(colorHex.replace('#',''),16),2,5);
  pl.position.set(0,1,2); scene.add(pl);

  const color=parseInt(colorHex.replace('#',''),16);
  const M=c=>new THREE.MeshPhongMaterial({color:c,shininess:60});
  const skin=M(0xffd4b0), bodyMat=M(color), darkMat=M(0x2d3a6b), whiteMat=M(0xffffff);

  // 身体
  const torso=new THREE.Mesh(new THREE.CylinderGeometry(.32,.28,.52,12),bodyMat);
  torso.position.y=-.05; scene.add(torso);

  // 圆圆肚子高光
  const belly=new THREE.Mesh(new THREE.SphereGeometry(.2,12,12),
    new THREE.MeshPhongMaterial({color,shininess:100,emissive:color,emissiveIntensity:.08}));
  belly.position.set(0,-.02,.28); belly.scale.set(1,.8,1); scene.add(belly);

  // 领口
  const collar=new THREE.Mesh(new THREE.CylinderGeometry(.16,.18,.1,12),whiteMat);
  collar.position.y=.22; scene.add(collar);

  // 头（大圆头卡通风格）
  const head=new THREE.Mesh(new THREE.SphereGeometry(.32,20,16),skin);
  head.position.y=.72; head.scale.set(1,1.05,1); scene.add(head);

  // 脸颊腮红
  [-1,1].forEach(s=>{
    const cheek=new THREE.Mesh(new THREE.SphereGeometry(.1,8,8),
      new THREE.MeshPhongMaterial({color:0xffb3ba,transparent:true,opacity:.5}));
    cheek.position.set(s*.22,.68,.26); cheek.scale.z=.3; scene.add(cheek);
  });

  // 眼睛（大眼萌系）
  [-1,1].forEach(s=>{
    const white=new THREE.Mesh(new THREE.SphereGeometry(.1,12,12),whiteMat);
    white.position.set(s*.12,.75,.28); white.scale.z=.5; scene.add(white);
    const pupil=new THREE.Mesh(new THREE.SphereGeometry(.07,10,10),M(0x1a1f3a));
    pupil.position.set(s*.12,.75,.32); pupil.scale.z=.4; scene.add(pupil);
    const shine=new THREE.Mesh(new THREE.SphereGeometry(.03,6,6),whiteMat);
    shine.position.set(s*.12+.04,.78,.37); scene.add(shine);
  });

  // 嘴巴（弧形微笑）
  const mGeo=new THREE.TorusGeometry(.07,.012,6,12,Math.PI);
  const mouth=new THREE.Mesh(mGeo,M(0xcc5566));
  mouth.position.set(0,.64,.3); mouth.rotation.z=Math.PI; scene.add(mouth);

  // 头发
  const hairColor=isCtrl?0xc8860a:0x2d3a6b;
  const hair=new THREE.Mesh(new THREE.SphereGeometry(.335,16,8,0,Math.PI*2,0,Math.PI*.52),M(hairColor));
  hair.position.y=.82; scene.add(hair);
  // 刘海
  const bang=new THREE.Mesh(new THREE.SphereGeometry(.18,.14,.12,8),M(hairColor));
  bang.position.set(0,.88,.26); scene.add(bang);

  // 耳朵
  [-1,1].forEach(s=>{
    const ear=new THREE.Mesh(new THREE.SphereGeometry(.1,8,8),skin);
    ear.position.set(s*.3,.72,0); ear.scale.z=.5; scene.add(ear);
  });

  // 手臂（小短手）
  const arms=[];
  [-1,1].forEach((s,i)=>{
    const ag=new THREE.Group(); ag.position.set(s*.42,.06,0);
    const upper=new THREE.Mesh(new THREE.CylinderGeometry(.1,.09,.3,8),bodyMat);
    upper.position.y=-.15; ag.add(upper);
    const hand=new THREE.Mesh(new THREE.SphereGeometry(.1,10,10),skin);
    hand.position.y=-.34; ag.add(hand);
    scene.add(ag); arms.push(ag);
  });

  // 腿
  [-1,1].forEach(s=>{
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(.1,.09,.32,8),darkMat);
    leg.position.set(s*.14,-.46,0); scene.add(leg);
    const shoe=new THREE.Mesh(new THREE.BoxGeometry(.16,.1,.22),M(0x1a1f3a));
    shoe.position.set(s*.14,-.65,.04); scene.add(shoe);
  });

  // 主控：金色皇冠
  if(isCtrl){
    const crownMat=new THREE.MeshPhongMaterial({color:0xffd700,shininess:120,emissive:0xffa500,emissiveIntensity:.3});
    const cBase=new THREE.Mesh(new THREE.CylinderGeometry(.28,.22,.1,6),crownMat);
    cBase.position.y=1.09; scene.add(cBase);
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2;
      const sp=new THREE.Mesh(new THREE.ConeGeometry(.06,.2,6),crownMat);
      sp.position.set(Math.cos(a)*.2,1.24,Math.sin(a)*.2); scene.add(sp);
    }
    // 宝石
    const gem=new THREE.Mesh(new THREE.OctahedronGeometry(.05),
      new THREE.MeshPhongMaterial({color:0xff4466,shininess:200,emissive:0xff2244,emissiveIntensity:.5}));
    gem.position.set(0,1.26,0); scene.add(gem);
  }

  // 光环装饰
  const halo=new THREE.Mesh(new THREE.TorusGeometry(.18,.012,6,32),
    new THREE.MeshPhongMaterial({color,emissive:color,emissiveIntensity:.6,transparent:true,opacity:.7}));
  halo.position.y=-.72; halo.rotation.x=Math.PI/2; scene.add(halo);

  // 动画
  let t=Math.random()*Math.PI*2;
  function anim(){
    requestAnimationFrame(anim); t+=.018;
    head.rotation.y=Math.sin(t*.6)*.12;
    head.position.y=.72+Math.sin(t*.8)*.015;
    arms[0].rotation.z=.15+Math.sin(t)*.15;
    arms[1].rotation.z=-.15-Math.sin(t)*.15;
    halo.rotation.z=t*.5; halo.material.opacity=.5+Math.sin(t*.7)*.2;
    if(isCtrl){ belly.material.emissiveIntensity=.06+Math.sin(t*1.2)*.04; }
    renderer.render(scene,camera);
  }
  anim();
}

// ─── 数据加载 ──────────────────────────────────────────────────
async function loadAll(){
  const [rr,tr]=await Promise.all([fetch('/roles'),fetch('/tasks')]);
  allRoles=await rr.json(); allTasks=await tr.json();
  renderStats(); renderRoles(); renderTasks(); renderCtrlPanel();
}

function renderStats(){
  document.getElementById('s-roles').textContent=allRoles.length;
  document.getElementById('s-tasks').textContent=allTasks.length;
  document.getElementById('s-done').textContent=allTasks.filter(t=>t.status==='done').length;
  const ctrl=allRoles.find(r=>r.is_controller);
  document.getElementById('s-ctrl').textContent=ctrl?ctrl.name.slice(0,6):'—';
  document.getElementById('s-ctrl-sub').textContent=ctrl?ctrl.description.slice(0,12)||'主控角色':'未设置';
}

function renderRoles(){
  const grid=document.getElementById('roles-grid');
  const sel=document.getElementById('sel-role');
  sel.innerHTML='<option value="">选择团队成员…</option>';
  if(!allRoles.length){
    grid.innerHTML='<div class="empty-grid"><div class="ei">👥</div><div style="font-weight:600">暂无团队成员</div><div style="font-size:.78rem;margin-top:4px">点击右侧新增角色</div></div>';
    return;
  }
  grid.innerHTML=allRoles.map((r,i)=>{
    const ic=r.is_controller;
    const icon=ic?'👑':ICONS[i%ICONS.length];
    const opt=document.createElement('option'); opt.value=r.id;
    opt.textContent=`${icon} ${r.name}`; sel.appendChild(opt);
    return `<div class="role-card${ic?' is-ctrl':''}" id="rc-${r.id}" onclick="pickRole('${r.id}')">
      ${ic?'<div class="ctrl-badge">👑 主控</div>':''}
      <div class="avatar-ring">
        <canvas id="av-${r.id}" width="80" height="80"></canvas>
        <div class="online-dot"></div>
      </div>
      <div class="role-name">${icon} ${r.name}</div>
      <div class="role-tag">agent: ${r.agent_id}</div>
      <div class="role-desc">${r.description||'暂无描述'}</div>
      <div class="role-actions">
        ${ic
          ?`<button class="btn-xs btn-cmd" onclick="event.stopPropagation();focusOrch()">⚡ 下令</button>`
          :`<button class="btn-xs btn-assign" onclick="event.stopPropagation();pickRole('${r.id}')">📋 分配</button>`}
        <button class="btn-xs btn-del" onclick="event.stopPropagation();delRole('${r.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
  allRoles.forEach((r,i)=>{
    const cvs=document.getElementById(`av-${r.id}`);
    if(cvs) renderAvatar(cvs, r.is_controller?'#f59e0b':COLORS[i%COLORS.length], r.is_controller);
  });
}

function renderCtrlPanel(){
  const ctrl=allRoles.find(r=>r.is_controller);
  document.getElementById('no-ctrl').style.display=ctrl?'none':'block';
  document.getElementById('ctrl-form').style.display=ctrl?'block':'none';
  if(ctrl){
    document.getElementById('ctrl-n').textContent=ctrl.name;
    document.getElementById('ctrl-d').textContent=ctrl.description||'主控角色';
  }
}

function renderTasks(){
  const feed=document.getElementById('task-feed');
  if(!allTasks.length){feed.innerHTML='<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:16px">暂无任务</div>';return;}
  feed.innerHTML=allTasks.slice(0,10).map(t=>{
    const r=allRoles.find(r=>r.id===t.role_id);
    const sc=t.status==='done'?'sp-done':t.status==='failed'?'sp-failed':'sp-running';
    const icon=t.is_orchestrated?'👑':'';
    const time=new Date(t.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    return `<div class="task-item">
      <div class="task-item-left">
        <div class="task-role">${icon}${r?.name||'未知'}</div>
        <div class="task-msg">${t.message}</div>
      </div>
      <div class="task-time">${time}</div>
      <div class="status-pill ${sc}">${t.status==='done'?'完成':t.status==='running'?'执行中':'失败'}</div>
    </div>`;
  }).join('');
}

// ─── 交互 ──────────────────────────────────────────────────────
function pickRole(id){
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById(`rc-${id}`)?.classList.add('selected');
  document.getElementById('sel-role').value=id;
  document.getElementById('sel-msg').focus();
}
function focusOrch(){document.getElementById('orch-msg').focus();}

async function addRole(){
  const name=document.getElementById('n-name').value.trim();
  const agentId=document.getElementById('n-agent').value.trim()||'main';
  const desc=document.getElementById('n-desc').value.trim();
  const prompt=document.getElementById('n-prompt').value.trim();
  const isCtrl=document.getElementById('n-ctrl').checked;
  if(!name){toast('⚠️ 请填写角色名称');return;}
  await fetch('/roles',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,agent_id:agentId,description:desc,system_prompt:prompt,is_controller:isCtrl})});
  ['n-name','n-desc','n-prompt'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('n-ctrl').checked=false;
  document.getElementById('tt').classList.remove('on');
  toast(isCtrl?`👑 主控「${name}」就位！`:`✅「${name}」已加入团队`);
  await loadAll();
}

async function delRole(id){
  const r=allRoles.find(r=>r.id===id);
  if(!confirm(`确认删除「${r?.name}」？`))return;
  await fetch(`/roles/${id}`,{method:'DELETE'});
  toast('🗑 角色已移除'); await loadAll();
}

async function runOrch(){
  const ctrl=allRoles.find(r=>r.is_controller);
  if(!ctrl){toast('⚠️ 无主控角色');return;}
  const msg=document.getElementById('orch-msg').value.trim();
  if(!msg){toast('⚠️ 请输入任务');return;}
  const btn=document.getElementById('orch-btn');
  const rb=document.getElementById('orch-result');
  btn.disabled=true; btn.textContent='⏳ 编排中…';
  rb.style.display='block'; rb.textContent='👑 主控正在分析并拆解任务，并发下发各角色…';
  const steps=['🧠 分析任务中…','⚡ 拆解子任务…','📤 下发各角色…','⚙️ 并发执行中…','📊 汇总报告…'];
  let si=0; toast(steps[si]);
  const t=setInterval(()=>{si=(si+1)%steps.length;toast(steps[si]);},3000);
  try{
    const res=await fetch('/orchestrate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({controller_id:ctrl.id,message:msg})});
    const task=await res.json();
    clearInterval(t);
    rb.innerHTML=`<div style="color:var(--success);font-weight:700;margin-bottom:8px">✅ 编排完成！</div>${task.result||''}`;
    toast('🎉 编排任务完成！'); await loadAll();
  }catch(e){clearInterval(t);rb.textContent=`❌ ${e.message}`;}
  btn.disabled=false; btn.textContent='⚡ 下达指令并编排';
}

async function sendTask(){
  const roleId=document.getElementById('sel-role').value;
  const msg=document.getElementById('sel-msg').value.trim();
  if(!roleId){toast('⚠️ 请选择角色');return;}
  if(!msg){toast('⚠️ 请输入任务');return;}
  const btn=document.getElementById('task-btn');
  const rb=document.getElementById('task-result');
  btn.disabled=true; btn.textContent='⏳ 执行中…';
  rb.style.display='block'; rb.textContent='正在处理…';
  try{
    const res=await fetch(`/roles/${roleId}/tasks`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const task=await res.json();
    rb.innerHTML=`<div class="status-pill ${task.status==='done'?'sp-done':'sp-failed'}" style="margin-bottom:8px;display:inline-flex">${task.status==='done'?'完成':'失败'}</div>\n${task.result||''}`;
    toast(task.status==='done'?'✅ 任务完成':'❌ 任务失败'); await loadAll();
  }catch(e){rb.textContent=`❌ ${e.message}`;}
  btn.disabled=false; btn.textContent='🚀 分配任务';
}

// Toggle 交互
document.getElementById('n-ctrl').addEventListener('change',function(){
  document.getElementById('tt').classList.toggle('on',this.checked);
});

loadAll();
</script>
